// ── Dashboard helpers (period sums, subjects, heatmap) ─────────
function sumLastDays(n) {
  let t = 0;
  for (let i = 0; i < n; i++) t += study.records[studyDayKeyOffset(i)] || 0;
  return t;
}
function todayDistractions() { return study.distractions[studyDayKey(Date.now())] || 0; }

function goalGaugeHTML(today) {
  if (!study.dailyGoalSec) return '';
  const pct = Math.min(100, today / study.dailyGoalSec * 100);
  const hit = today >= study.dailyGoalSec;
  return `
    <div class="chart-block">
      <div class="chart-title"><span>오늘 목표 달성률</span></div>
      <div class="goal-gauge ${hit ? 'hit' : ''}">
        <div class="gg-top">
          <span class="gg-pct">${Math.round(pct)}%</span>
          <span class="gg-sub">${fmt(today).slice(0,5)} / ${fmtHrs(study.dailyGoalSec)}${hit ? ' · 달성 🎉' : ''}</span>
        </div>
        <div class="gg-bar"><i style="width:${pct.toFixed(1)}%"></i></div>
      </div>
    </div>`;
}

function subjectBreakHTML() {
  const day = study.subjects[studyDayKey(Date.now())] || {};
  const total = todayStudySec();
  const entries = Object.entries(day).filter(([,v]) => v > 0.5).sort((a,b) => b[1]-a[1]);
  const tagged = entries.reduce((a,[,v]) => a+v, 0);
  const untag = Math.max(0, total - tagged);
  if (!entries.length && untag < 1) return '';
  const line = (name, sec, color) => {
    const pct = total > 0 ? Math.min(100, sec/total*100) : 0;
    return `<div class="subj-line">
      <div class="subj-line-top"><span class="sl-name">${name}</span><span class="sl-val">${fmt(sec).slice(0,5)}</span></div>
      <div class="subj-line-bar"><i style="width:${pct.toFixed(1)}%;background:${color}"></i></div>
    </div>`;
  };
  const rows = entries.map(([name,sec],i) => line(escHtml(name), sec, ACCENTS[i % ACCENTS.length]));
  if (untag >= 1) rows.push(line('기타', untag, 'var(--dim)'));
  return `<div class="chart-block"><div class="chart-title"><span>오늘 과목별</span></div>
    <div class="subj-break">${rows.join('')}</div></div>`;
}

function heatmapHTML() {
  const WEEKS = 18;
  const base = new Date(Date.now() - study.resetHour * 3600 * 1000);
  base.setHours(0,0,0,0);
  const todayDow = base.getDay();
  const start = new Date(base);
  start.setDate(start.getDate() - (WEEKS - 1) * 7 - todayDow);
  const cells = [];
  let max = 1;
  const cur = new Date(start);
  for (let i = 0; i < WEEKS * 7; i++) {
    const key = `${cur.getFullYear()}-${pad(cur.getMonth()+1)}-${pad(cur.getDate())}`;
    const future = cur.getTime() > base.getTime();
    const sec = future ? -1 : (study.records[key] || 0);
    if (sec > max) max = sec;
    cells.push({ sec, future, label: `${cur.getMonth()+1}/${cur.getDate()}` });
    cur.setDate(cur.getDate() + 1);
  }
  const body = cells.map(c => {
    if (c.future) return `<div class="heat-cell" style="visibility:hidden"></div>`;
    let bg = 'var(--surf2)';
    if (c.sec > 0.5) {
      const t = Math.min(1, c.sec / max);
      bg = `color-mix(in srgb, var(--accent) ${Math.round((0.22 + 0.78*t)*100)}%, var(--surf2))`;
    }
    return `<div class="heat-cell" style="background:${bg}" title="${c.label} · ${fmtHrs(Math.max(0,c.sec))}"></div>`;
  }).join('');
  const lg = ['var(--surf2)','color-mix(in srgb, var(--accent) 35%, var(--surf2))','color-mix(in srgb, var(--accent) 70%, var(--surf2))','var(--accent)']
    .map(c => `<span class="hl-cell" style="background:${c}"></span>`).join('');
  return `<div class="chart-block">
    <div class="chart-title"><span>최근 18주</span></div>
    <div class="heat-wrap"><div class="heat">${body}</div></div>
    <div class="heat-legend">적음 ${lg} 많음</div>
  </div>`;
}

function renderDashboard() {
  const body = $('dashBody');
  const st   = studyStats();
  const today = todayStudySec();

  // Reset-hour selector options
  const hourOpts = Array.from({length:24}, (_,h) =>
    `<option value="${h}" ${h===study.resetHour?'selected':''}>${pad(h)}:00</option>`).join('');

  if (st.days === 0 && today < 1) {
    body.innerHTML = `
      <div class="dash-empty">아직 기록이 없어요.<br>공부 스톱워치를 시작해 보세요 ${icoSm('play')}</div>
      ${resetHourBlock(hourOpts)}`;
    bindResetHour();
    return;
  }

  // Last 14 days bar chart data
  const N = 14;
  const data = [];
  for (let i = N-1; i >= 0; i--) {
    const key = studyDayKeyOffset(i);
    const sec = study.records[key] || 0;
    const parts = key.split('-');
    data.push({ key, sec, label: `${parseInt(parts[1])}/${parseInt(parts[2])}` });
  }
  const maxSec = Math.max(...data.map(d => d.sec), 1);

  // Build SVG bar chart
  const W = 440, H = 150, padL = 4, padR = 4, padT = 12, padB = 20;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const bw = plotW / N;
  const avgY = padT + plotH - (st.avg / maxSec) * plotH;

  const bars = data.map((d,i) => {
    const bh = (d.sec / maxSec) * plotH;
    const x  = padL + i*bw + bw*0.18;
    const y  = padT + plotH - bh;
    const w  = bw*0.64;
    const isToday = i === N-1;
    const fill = isToday ? 'var(--accent)' : (d.sec>0 ? '#4a5a18' : '#1c1c1c');
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${Math.max(0,bh).toFixed(1)}" rx="2" fill="${fill}"></rect>`;
  }).join('');

  // x labels: show every other to avoid crowding
  const labels = data.map((d,i) => {
    if (i % 2 !== (N-1)%2) return '';
    const x = padL + i*bw + bw/2;
    return `<text x="${x.toFixed(1)}" y="${H-6}" fill="var(--dim)" font-size="9" text-anchor="middle" font-family="Space Mono">${d.label}</text>`;
  }).join('');

  const avgLine = st.avg > 0
    ? `<line x1="${padL}" y1="${avgY.toFixed(1)}" x2="${W-padR}" y2="${avgY.toFixed(1)}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 3" opacity="0.8"></line>`
    : '';

  // Projection block
  const dd = dDayNum();
  let projHTML = '';
  if (dd !== null && dd > 0 && st.avg > 0) {
    const projSec = st.avg * dd;
    projHTML = `
      <div class="proj-card">
        <div class="pc-label">목표까지 예상</div>
        <div class="pc-main">남은 <b>D-${dd}</b> 동안 하루 평균 <b>${fmtHrs(st.avg)}</b> 페이스면<br>
        앞으로 <b>+${fmtHrs(projSec)}</b> 더 공부할 수 있어요.</div>
      </div>`;
  } else if (dd !== null && dd > 0) {
    projHTML = `
      <div class="proj-card">
        <div class="pc-label">목표까지</div>
        <div class="pc-main">남은 <b>D-${dd}</b> · 공부 기록이 쌓이면 예상치를 보여드려요.</div>
      </div>`;
  }

  const distToday = todayDistractions();
  const focusCard = (study.focusMode || distToday > 0)
    ? `<div class="stat-card"><div class="stat-label">오늘 이탈</div><div class="stat-value">${distToday}<small> 회</small></div></div>`
    : '';

  body.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">오늘</div><div class="stat-value">${fmtHrs(today)}<small> ${fmt(today).slice(0,5)}</small></div></div>
      <div class="stat-card"><div class="stat-label">일 평균</div><div class="stat-value">${fmtHrs(st.avg)}</div></div>
      <div class="stat-card"><div class="stat-label">총 공부</div><div class="stat-value">${fmtHrs(st.total)}</div></div>
      <div class="stat-card"><div class="stat-label">연속 일수</div><div class="stat-value">${st.streak}<small> 일</small></div></div>
    </div>

    ${goalGaugeHTML(today)}

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">최근 7일</div><div class="stat-value">${fmtHrs(sumLastDays(7))}</div></div>
      <div class="stat-card"><div class="stat-label">최근 30일</div><div class="stat-value">${fmtHrs(sumLastDays(30))}</div></div>
    </div>

    ${projHTML}

    ${subjectBreakHTML()}

const META_KEY     = 'timer_sync_meta_v1';
const PUSH_DELAY    = 4000;    // settle time after the last change
const MAX_PUSH_WAIT = 30000;   // force a flush at least this often during
                               // continuous activity (e.g. a running stopwatch)
let fbAuth = null, db = null, cloudUid = null, cloudUnsub = null;
let syncReady = false, pushTimer = null, lastPushedJson = null, firstDirtyAt = 0;
let pushSilent = false; // true when the pending push is sync-driven (no toast)
let syncStatus = '';   // human-readable status shown in the account sheet

function setSyncStatus(s, err) {

function syncMeta() { try { return JSON.parse(localStorage.getItem(META_KEY)) || {}; } catch(e) { return {}; } }
function syncTouch() {
  try { localStorage.setItem(META_KEY, JSON.stringify({ updatedAt: Date.now() })); } catch(e) {}
  pushSilent = false;   // a genuine local change → confirm with a toast on upload
  if (cloudUid && syncReady) schedulePush();
}
function schedulePush() {
  if (!firstDirtyAt) firstDirtyAt = Date.now();
  clearTimeout(pushTimer);
  // Debounce after the last change, but never wait longer than MAX_PUSH_WAIT
  // so continuous per-second changes still upload periodically.
  const delay = Math.min(PUSH_DELAY, Math.max(0, MAX_PUSH_WAIT - (Date.now() - firstDirtyAt)));
  pushTimer = setTimeout(pushCloud, delay);
}

function localBundle() {
  const j = (k, d) => { try { const v = localStorage.getItem(k); return v == null ? d : JSON.parse(v); } catch(e) { return d; } };
  return { timer: j(STORE_KEY, null), goals: j(GOALS_KEY, []), study: j(STUDY_KEY, null),
           notes: j(NOTES_KEY, []), tomb: j(TOMB_KEY, {}) };
}
// Merge deletion tombstones: keep the latest deletedAt per id.
function mergeTomb(a, b) {
  const o = Object.assign({}, a || {}); const r = b || {};
  for (const k in r) { if (!(k in o) || r[k] > o[k]) o[k] = r[k]; }
  return o;
}
// Union notes by id (newest edit wins); drop ones deleted after their last edit.
function mergeNotes(local, remote, tmb) {
  local = local || []; remote = remote || []; tmb = tmb || {};
  const map = new Map();
  remote.forEach(n => map.set(n.id, n));
  local.forEach(n => {
    const ex = map.get(n.id);
    if (!ex || (n.updatedAt || 0) >= (ex.updatedAt || 0)) map.set(n.id, n);
  });
  return [...map.values()]
    .filter(n => !(n.id in tmb) || (n.updatedAt || 0) > tmb[n.id])
    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}

// Merge study: recorded time never lost (max per day), settings follow
// newest-wins, and the live stopwatch run-state stays device-local so two
// devices can't double-count the same running stopwatch.
function mergeStudy(local, remote, remoteNewer) {
  if (!remote) return local;
  if (!local)  return remote;
  const out = remoteNewer ? Object.assign({}, local, remote)
                          : Object.assign({}, remote, local);
  out.swRunning  = local.swRunning;   // runtime state: this device only
  out.swLastTick = local.swLastTick;
  out.records = {};
  const keys = new Set([...Object.keys(local.records || {}), ...Object.keys(remote.records || {})]);
  keys.forEach(k => out.records[k] = Math.max(local.records?.[k] || 0, remote.records?.[k] || 0));
  // Per-day subject seconds: max per subject per day (never lose recorded time).
  out.subjects = {};
  const sdays = new Set([...Object.keys(local.subjects || {}), ...Object.keys(remote.subjects || {})]);
  sdays.forEach(d => {
    const ls = local.subjects?.[d] || {}, rs = remote.subjects?.[d] || {}, m = {};
    new Set([...Object.keys(ls), ...Object.keys(rs)]).forEach(s => m[s] = Math.max(ls[s] || 0, rs[s] || 0));
    out.subjects[d] = m;
  });
  // Per-day distraction counts: max.
  out.distractions = {};
  const xkeys = new Set([...Object.keys(local.distractions || {}), ...Object.keys(remote.distractions || {})]);
  xkeys.forEach(k => out.distractions[k] = Math.max(local.distractions?.[k] || 0, remote.distractions?.[k] || 0));
  // Subject list: union (preserve the newer device's ordering first).
  const baseList = (remoteNewer ? remote.subjectList : local.subjectList) || [];
  const otherList = (remoteNewer ? local.subjectList : remote.subjectList) || [];
  out.subjectList = Array.from(new Set([...baseList, ...otherList]));
  return out;
}
// Union goals by id, preserving local order; drop tombstoned (deleted) ones.
function mergeGoals(local, remote, tmb) {
  local = local || []; remote = remote || []; tmb = tmb || {};
  const ids = new Set(local.map(g => g.id));
  return local.concat(remote.filter(g => !ids.has(g.id))).filter(g => !(g.id in tmb));
}

function pushCloud() {
  clearTimeout(pushTimer); pushTimer = null; firstDirtyAt = 0;
  pushSilent = false;
  if (!cloudUid || !syncReady || !db) return;
  const b = localBundle();
  const payload = { timer: b.timer ?? null, goals: b.goals || [], study: b.study ?? null,
                    notes: b.notes || [], tomb: b.tomb || {}, updatedAt: syncMeta().updatedAt || Date.now() };
  const json = JSON.stringify(payload);
  if (json === lastPushedJson) return;
  lastPushedJson = json;
  db.collection('users').doc(cloudUid).set(payload)
    .then(() => {
      setSyncStatus('동기화됨', '');
      // No toast on automatic sync — silent background upload.
    })
    .catch(e => {
      lastPushedJson = null;   // allow retry
      const code = e?.code || String(e);
      setSyncStatus('업로드 실패', code);
      showToast('동기화 업로드 실패: ' + code);
    });
}

// ── Canonical, jitter-free comparison helpers ──
// Stable key order + rounded seconds so semantically equal data never looks
// "changed" (which is what caused the reload ping-pong between devices).
function stableStr(v) {
  if (v === null || typeof v !== 'object') return JSON.stringify(v ?? null);
  if (Array.isArray(v)) return '[' + v.map(stableStr).join(',') + ']';
  return '{' + Object.keys(v).sort().map(k => JSON.stringify(k) + ':' + stableStr(v[k])).join(',') + '}';
}
function canonTimer(t) { return stableStr(t ?? null); }
function canonGoals(g) { return stableStr([...(g || [])].sort((a, b) => (a.id || 0) - (b.id || 0))); }
function canonStudy(s) {
  if (!s) return 'null';
  const rec = {};
  Object.keys(s.records || {}).forEach(k => { const v = Math.floor(s.records[k] || 0); if (v > 0) rec[k] = v; });
  const subj = {};
  Object.keys(s.subjects || {}).forEach(d => {
    const m = {}, sd = s.subjects[d] || {};
    Object.keys(sd).forEach(k => { const v = Math.floor(sd[k] || 0); if (v > 0) m[k] = v; });
    if (Object.keys(m).length) subj[d] = m;
  });
  const dist = {};
  Object.keys(s.distractions || {}).forEach(k => { const v = Math.floor(s.distractions[k] || 0); if (v > 0) dist[k] = v; });
  return stableStr({                                   // volatile run-state excluded
    resetHour: s.resetHour || 0, records: rec, subjects: subj, distractions: dist,
    subjectList: s.subjectList || [], curSubject: s.curSubject || '',
    dailyGoalSec: s.dailyGoalSec || 0, theme: s.theme || 'dark',
    accent: s.accent || '#cef231', focusMode: !!s.focusMode, pomo: s.pomo || null,
  });
}
function canonNotes(n) {
  return stableStr([...(n || [])].sort((a, b) => (a.id || 0) - (b.id || 0))
    .map(x => ({ id: x.id, title: x.title || '', type: x.type || 'text',
                 text: x.text || '', items: x.items || [], pinned: !!x.pinned })));
}
function canonTomb(t) { return stableStr(t || {}); }

function setMeta(v) { try { localStorage.setItem(META_KEY, JSON.stringify({ updatedAt: v })); } catch(e) {} }
function writeBundle(b) {
  try {
    if (b.timer) localStorage.setItem(STORE_KEY, JSON.stringify(b.timer));
    else         localStorage.removeItem(STORE_KEY);
    localStorage.setItem(GOALS_KEY, JSON.stringify(b.goals || []));
    if (b.study) localStorage.setItem(STUDY_KEY, JSON.stringify(b.study));
    localStorage.setItem(NOTES_KEY, JSON.stringify(b.notes || []));
    localStorage.setItem(TOMB_KEY, JSON.stringify(b.tomb || {}));
  } catch(e) {}
}
// Refresh goals + study + notes in the live UI without a full page reload.
function applyGoalsStudyLive() {
  loadGoals();
  loadStudy();
  loadNotes();
  loadTomb();
  if (study.swRunning && study.swLastTick == null) study.swLastTick = Date.now();

// Reconcile a cloud snapshot with local data. Loop-free: the merged version
// is max(local, remote) — never "now" — so receiving an update doesn't make
// this device look newer and bounce back to the peer.
function onCloud(doc) {
  const remote = doc.exists ? doc.data() : null;
  setSyncStatus(remote ? '클라우드 연결됨' : '클라우드에 데이터 없음 — 이 기기 데이터를 업로드합니다', '');

  const local = localBundle();
  const lm = syncMeta().updatedAt || 0;
  const rm = remote?.updatedAt || 0;
  const remoteNewer = rm > lm;

  const mergedTomb = mergeTomb(local.tomb, remote?.tomb);
  const merged = {
    timer: remoteNewer ? (remote?.timer ?? local.timer ?? null) : (local.timer ?? null),
    goals: mergeGoals(local.goals, remote?.goals, mergedTomb),
    study: mergeStudy(local.study, remote?.study, remoteNewer),
    notes: mergeNotes(local.notes, remote?.notes, mergedTomb),
    tomb: mergedTomb,
  };
  const mergedVer = Math.max(lm, rm);

  // Canonical signatures for change detection.
  const sig = b => canonTimer(b.timer) + '|' + canonGoals(b.goals) + '|' + canonStudy(b.study)
                 + '|' + canonNotes(b.notes) + '|' + canonTomb(b.tomb);
  const localSig  = sig(local);
  const mergedSig = sig(merged);
  const remoteSig = remote ? sig({ timer: remote.timer, goals: remote.goals, study: remote.study, notes: remote.notes, tomb: remote.tomb }) : '';

  const localChanged = mergedSig !== localSig;     // our stored data needs updating
  const cloudStale   = mergedSig !== remoteSig;    // cloud is missing some of our data

  syncReady = true;

  if (localChanged) {
    writeBundle(merged);
    setMeta(mergedVer);
    const timerChanged = canonTimer(local.timer) !== canonTimer(merged.timer);
    if (timerChanged) {
      // Active countdown changed — a reload is the safe way to restart it.
      if (cloudStale) { lastPushedJson = null; pushSilent = true; schedulePush(); }
      try { sessionStorage.setItem('syncReload', '1'); } catch(e) {}
      location.reload();
      return;
    }
    applyGoalsStudyLive();      // goals / study only → no reload needed
  } else {
    setMeta(mergedVer);         // adopt the higher version so we stop re-diffing
  }

  if (cloudStale) { lastPushedJson = null; pushSilent = true; schedulePush(); }
  renderAcct();
}

function onAuthChange(user) {

  cloudUid = user ? user.uid : null;

    setSyncStatus('연결 중…', '');
    cloudUnsub = db.collection('users').doc(user.uid)

}

function renderAcct() {
  const body = $('acctBody');
  if (!body) return;
  if (!fbReady) {
    body.innerHTML =
      '<div class="acct-note">계정 동기화를 켜려면 Firebase 설정이 필요합니다.<br><br>' +

  if (!user) {
    body.innerHTML =
      '<div class="acct-note">로그인하면 목표·공부 기록·타이머가 기기 간에 자동으로 동기화됩니다.</div>' +
      '<button class="modal-confirm" id="acctSignIn">Google로 로그인</button>';
    $('acctSignIn').addEventListener('click', signIn);
  } else {
    const when = syncMeta().updatedAt ? new Date(syncMeta().updatedAt).toLocaleString('ko-KR') : '—';
    const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    const statusLine = syncError
      ? '<div class="acct-meta" style="color:var(--danger)">⚠ ' + esc(syncStatus) + ' (' + esc(syncError) + ')</div>'
      : '<div class="acct-meta">' + esc(syncStatus || '동기화됨') + ' · 마지막 변경 ' + when + '</div>';
    body.innerHTML =
      '<div class="acct-row"><div class="acct-email">' + esc(user.email || user.displayName || user.uid) + '</div>' +
      statusLine + '</div>' +
      '<button class="modal-confirm" id="acctSyncNow">지금 업로드</button>' +
      '<button class="acct-secondary" id="acctPull">클라우드에서 다시 불러오기</button>' +
      '<button class="acct-secondary" id="acctSignOut">로그아웃</button>';
    $('acctSyncNow').addEventListener('click', () => { lastPushedJson = null; pushCloud(); showToast('업로드 중…'); });
    $('acctPull').addEventListener('click', pullNow);
    $('acctSignOut').addEventListener('click', signOut);
  }
}

// Force a one-time read from the cloud and merge it in (useful if the live
// listener was blocked or the user wants to re-pull on demand).
function pullNow() {
  if (!cloudUid || !db) { showToast('로그인이 필요합니다'); return; }
  showToast('불러오는 중…');
  db.collection('users').doc(cloudUid).get()
    .then(doc => {
      if (!doc.exists) { showToast('클라우드에 데이터가 없습니다'); setSyncStatus('클라우드에 데이터 없음', ''); return; }
      onCloud(doc);   // merges + reloads if there are changes
      showToast('불러오기 완료');
    })
    .catch(e => {
      const code = e?.code || String(e);
      setSyncStatus('불러오기 실패', code);
      showToast('불러오기 실패: ' + code);
    });
}

if (fbReady) {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    fbAuth = firebase.auth();
    db = firebase.firestore();
    fbAuth.onAuthStateChanged(onAuthChange);
  } catch(e) { console.warn('Firebase init failed', e); }
}
window.addEventListener('beforeunload', () => { clearTimeout(pushTimer); pushCloud(); });

const acctModal = $('acctModal');
$('acctBtn').addEventListener('click', () => { renderAcct(); acctModal.classList.add('open'); });
$('acctClose').addEventListener('click', () => acctModal.classList.remove('open'));
acctModal.addEventListener('click', e => { if (e.target === acctModal) acctModal.classList.remove('open'); });

// ── Notes / memo UI ────────────────────────────────────────────
const notesModal    = $('notesModal');
const noteEditModal = $('noteEditModal');
const memoWidget    = $('memoWidget');
let memoCollapseTimer = null;
let memoIndex = 0;     // which note the widget is showing
let editDraftItems = [];
let editDraftType  = 'text';

// Notes ordered for the main widget: pinned first, then most-recent.
function memoOrderedNotes() {
  return notes.slice().sort((a, b) =>
    (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || (b.updatedAt || 0) - (a.updatedAt || 0));
}
function pinnedOrRecentNote() {
  const list = memoOrderedNotes();
  return list.length ? list[0] : null;
}
function notePreviewText(n) {
  if (n.type === 'list') {
    const items = n.items || [];
    return `체크리스트 · ${items.filter(i => i.done).length}/${items.length} 완료`;
  }
  return (n.text || '').replace(/\s+/g, ' ').trim().slice(0, 60) || '내용 없음';
}

// Main-screen memo widget. The fab is always in flow (fixed slot); the card is
// an absolute overlay so opening/closing never moves the UI below it.
function renderMemoWidget() {
  const list = memoOrderedNotes();
  if (!list.length) { memoWidget.style.display = 'none'; memoWidget.innerHTML = ''; memoWidget.classList.remove('open'); return; }
  memoWidget.style.display = '';
  memoIndex = Math.max(0, Math.min(memoIndex, list.length - 1));
  const n = list[memoIndex];
  const open = memoWidget.classList.contains('open');
  let html = `<button class="memo-fab" id="memoFab" title="메모">${ICONS.note}<span class="memo-dot"></span></button>`;
  if (open) {
    const body = n.type === 'list'
      ? `<div class="memo-checks">${(n.items || []).map((it, i) =>
          `<label class="memo-check ${it.done ? 'done' : ''}"><input type="checkbox" data-i="${i}" ${it.done ? 'checked' : ''}><span>${escHtml(it.t || '')}</span></label>`
        ).join('') || '<div class="memo-empty">항목 없음</div>'}</div>`
      : `<div class="memo-text">${n.text ? escHtml(n.text) : '<span class="memo-empty">내용 없음</span>'}</div>`;
    const nav = list.length > 1
      ? `<div class="memo-nav">
           <button class="memo-mini-btn" id="memoPrev" title="이전">${ICONS.chevL}</button>
           <span class="memo-nav-count">${memoIndex + 1} / ${list.length}</span>
           <button class="memo-mini-btn" id="memoNext" title="다음">${ICONS.chevR}</button>
         </div>`
      : '';
    html +=
      `<div class="memo-card">
         <div class="memo-card-head">
           ${n.pinned ? '<span class="memo-pin-ic">'+icoSm('pin')+'</span>' : ''}
           <span class="memo-card-title">${escHtml(n.title || '메모')}</span>
           <div class="memo-card-actions">
             <button class="memo-mini-btn" id="memoEdit" title="편집">${ICONS.pencil}</button>
             <button class="memo-mini-btn" id="memoOpen" title="메모장">${ICONS.list}</button>
             <button class="memo-mini-btn" id="memoCollapse" title="접기">${ICONS.close}</button>
           </div>
         </div>
         ${body}
         ${nav}
       </div>`;
  }
  memoWidget.innerHTML = html;
  $('memoFab').addEventListener('click', () => memoWidget.classList.contains('open') ? collapseMemo() : expandMemo());
  if (!open) return;
  memoWidget.querySelectorAll('.memo-check input').forEach(cb => {
    cb.addEventListener('change', () => {
      cancelMemoAutoCollapse();
      n.items[+cb.dataset.i].done = cb.checked;
      n.updatedAt = Date.now();
      saveNotes();
      memoIndex = memoOrderedNotes().findIndex(x => x.id === n.id);  // keep showing this note
      renderMemoWidget();
    });
  });
  const nav = d => () => { cancelMemoAutoCollapse(); memoIndex = (memoIndex + d + list.length) % list.length; renderMemoWidget(); };
  if ($('memoPrev')) $('memoPrev').addEventListener('click', nav(-1));
  if ($('memoNext')) $('memoNext').addEventListener('click', nav(1));
  $('memoEdit').addEventListener('click', () => { collapseMemo(); openNoteEditor(n.id); });
  $('memoOpen').addEventListener('click', () => { collapseMemo(); openNotes(); });
  $('memoCollapse').addEventListener('click', collapseMemo);
  memoWidget.querySelector('.memo-card').addEventListener('pointerdown', cancelMemoAutoCollapse, { once: true });
}
// User-initiated expand: stays open until the user closes it (no auto-collapse).
function expandMemo() { cancelMemoAutoCollapse(); memoIndex = 0; memoWidget.classList.add('open'); renderMemoWidget(); }
function collapseMemo() {
  cancelMemoAutoCollapse();
  const card = memoWidget.querySelector('.memo-card');
  if (card && memoWidget.classList.contains('open')) {
    card.classList.add('memo-out');
    const done = () => { memoWidget.classList.remove('open'); renderMemoWidget(); };
    card.addEventListener('animationend', done, { once: true });
    setTimeout(() => { if (memoWidget.classList.contains('open')) done(); }, 240);
  } else {
    memoWidget.classList.remove('open');
    renderMemoWidget();
  }
}
// Only the initial on-entry expansion auto-collapses.
function scheduleMemoAutoCollapse() { cancelMemoAutoCollapse(); memoCollapseTimer = setTimeout(collapseMemo, 2000); }
function cancelMemoAutoCollapse() { clearTimeout(memoCollapseTimer); memoCollapseTimer = null; }

// Notes manager
function openNotes() { renderNotesList(); notesModal.classList.add('open'); }
function renderNotesList() {
  const list = $('notesList');
  if (!notes.length) {
    list.innerHTML = '<div class="notes-empty">아직 메모가 없습니다.<br>위 버튼으로 새 메모를 추가하세요.</div>';
    return;
  }
  const sorted = notes.slice().sort((a, b) =>
    (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || (b.updatedAt || 0) - (a.updatedAt || 0));
  list.innerHTML = sorted.map(n =>
    `<div class="note-row" data-id="${n.id}">
       <div class="note-row-body">
         <div class="note-row-title">${n.pinned ? '<span class="note-pin-ic">'+icoSm('pin')+'</span> ' : ''}${n.type === 'list' ? icoSm('check')+' ' : ''}${escHtml(n.title || '메모')}</div>
         <div class="note-row-sub">${escHtml(notePreviewText(n))}</div>
       </div>
       <button class="note-row-del" data-del="${n.id}">${ICONS.trash}</button>
     </div>`).join('');
  list.querySelectorAll('.note-row').forEach(r => {
    r.addEventListener('click', e => { if (!e.target.closest('.note-row-del')) openNoteEditor(parseInt(r.dataset.id)); });
  });
  list.querySelectorAll('.note-row-del').forEach(b => {
    b.addEventListener('click', () => {
      const delId = parseInt(b.dataset.del);
      notes = notes.filter(n => n.id !== delId);
      tombstone(delId);
      saveNotes(); renderNotesList(); renderMemoWidget();
    });
  });
}

// Note editor
function openNoteEditor(id, newType) {
  editingNoteId = (id != null) ? id : null;
  const n = (id != null) ? notes.find(x => x.id === id)
                         : { title: '', type: newType || 'text', text: '', items: [], pinned: false };
  if (!n) return;
  $('noteEditTitle').textContent = (id != null) ? '메모 편집' : (n.type === 'list' ? '새 체크리스트' : '새 메모');
  $('noteTitleInput').value = n.title || '';
  $('notePinInput').checked = !!n.pinned;
  $('noteDelete').style.display = (id != null) ? '' : 'none';
  editDraftType = n.type === 'list' ? 'list' : 'text';
  if (editDraftType === 'text') {
    $('noteEditBody').innerHTML = `<textarea id="noteTextInput" placeholder="내용">${escHtml(n.text || '')}</textarea>`;
    const ta = $('noteTextInput');
    // ArrowUp at the very start moves focus up to the title.
    ta.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' && ta.selectionStart === 0 && ta.selectionEnd === 0) {
        e.preventDefault(); $('noteTitleInput').focus();
      }
    });
  } else {
    editDraftItems = (n.items || []).map(i => ({ t: i.t || '', done: !!i.done }));
    if (!editDraftItems.length) editDraftItems.push({ t: '', done: false });  // start ready to type
    renderEditItems();
  }
  noteEditModal.classList.add('open');
}
function renderEditItems() {
  const body = $('noteEditBody');
  body.innerHTML =
    `<div class="note-items">` +
    editDraftItems.map((it, i) =>
      `<div class="note-item-edit">
         <input type="checkbox" data-i="${i}" ${it.done ? 'checked' : ''}>
         <input type="text" data-i="${i}" value="${escHtml(it.t)}" placeholder="할 일">
         <button class="note-item-del" data-i="${i}">✕</button>
       </div>`).join('') +
    `</div><button class="note-add-item" id="noteAddItem">+ 항목 추가</button>`;
  body.querySelectorAll('.note-item-edit input[type=checkbox]').forEach(cb =>
    cb.addEventListener('change', () => { editDraftItems[+cb.dataset.i].done = cb.checked; }));
  body.querySelectorAll('.note-item-edit input[type=text]').forEach(tx => {
    tx.addEventListener('input', () => { editDraftItems[+tx.dataset.i].t = tx.value; });
    tx.addEventListener('keydown', e => {
      const i = +tx.dataset.i;
      if (e.key === 'Enter') {
        // Enter adds a new item right below and focuses it.
        e.preventDefault();
        editDraftItems.splice(i + 1, 0, { t: '', done: false });
        renderEditItems();
        const inputs = body.querySelectorAll('.note-item-edit input[type=text]');
        if (inputs[i + 1]) inputs[i + 1].focus();
      } else if (e.key === 'ArrowDown') {
        // Move focus to the next item.
        const inputs = body.querySelectorAll('.note-item-edit input[type=text]');
        if (inputs[i + 1]) { e.preventDefault(); inputs[i + 1].focus(); }
      } else if (e.key === 'ArrowUp') {
        // Move focus to the previous item, or up to the title.
        e.preventDefault();
        const inputs = body.querySelectorAll('.note-item-edit input[type=text]');
        if (i > 0) inputs[i - 1].focus();
        else $('noteTitleInput').focus();
      }
    });
  });
  body.querySelectorAll('.note-item-del').forEach(b =>
    b.addEventListener('click', () => { editDraftItems.splice(+b.dataset.i, 1); renderEditItems(); }));
  $('noteAddItem').addEventListener('click', () => {
    editDraftItems.push({ t: '', done: false });
    renderEditItems();
    const inputs = body.querySelectorAll('.note-item-edit input[type=text]');
    if (inputs.length) inputs[inputs.length - 1].focus();
  });
}
function saveNoteFromEditor() {
  let n = (editingNoteId != null) ? notes.find(x => x.id === editingNoteId) : null;
  if (!n) { n = { id: Date.now(), type: editDraftType }; notes.push(n); }
  n.title = $('noteTitleInput').value.trim();
  n.type  = editDraftType;
  if (editDraftType === 'text') { n.text = $('noteTextInput') ? $('noteTextInput').value : ''; n.items = []; }
  else { n.items = editDraftItems.filter(i => i.t.trim() !== '' || i.done).map(i => ({ t: i.t, done: i.done })); n.text = ''; }
  const now = Date.now();
  if ($('notePinInput').checked) {
    // Unpin any other pinned note and bump its updatedAt so the unpin syncs.
    notes.forEach(x => { if (x.id !== n.id && x.pinned) { x.pinned = false; x.updatedAt = now; } });
    n.pinned = true;
  } else {
    n.pinned = false;
  }
  n.updatedAt = now;
  saveNotes();
  noteEditModal.classList.remove('open');
  renderNotesList();
  renderMemoWidget();
}
function deleteEditingNote() {
  if (editingNoteId != null) {
    notes = notes.filter(n => n.id !== editingNoteId);
    tombstone(editingNoteId);
    saveNotes();
  }
  noteEditModal.classList.remove('open');
  renderNotesList();
  renderMemoWidget();
}

$('notesBtn').addEventListener('click', openNotes);
$('notesClose').addEventListener('click', () => notesModal.classList.remove('open'));
notesModal.addEventListener('click', e => { if (e.target === notesModal) notesModal.classList.remove('open'); });
$('newTextNote').addEventListener('click', () => openNoteEditor(null, 'text'));
$('newListNote').addEventListener('click', () => openNoteEditor(null, 'list'));
$('noteEditClose').addEventListener('click', () => noteEditModal.classList.remove('open'));
noteEditModal.addEventListener('click', e => { if (e.target === noteEditModal) noteEditModal.classList.remove('open'); });
$('noteSave').addEventListener('click', saveNoteFromEditor);
$('noteDelete').addEventListener('click', deleteEditingNote);
// ArrowDown from the title drops into the body (first checklist item / memo text).
$('noteTitleInput').addEventListener('keydown', e => {
  if (e.key !== 'ArrowDown') return;
  const body = $('noteEditBody');
  if (editDraftType === 'list') {
    const first = body.querySelector('.note-item-edit input[type=text]');
    if (first) { e.preventDefault(); first.focus(); }
  } else {
    const ta = $('noteTextInput');
    if (ta) { e.preventDefault(); ta.focus(); ta.setSelectionRange(0, 0); }
  }
});

// ── Restore ────────────────────────────────────────────────────
loadGoals();
loadStudy();
loadNotes();
loadTomb();
applyTheme();
lastSeenStudyDay = studyDayKey(Date.now());
// On restore, do not count time the page was closed.
if (study.swRunning) study.swLastTick = Date.now();

(function restore() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(STORE_KEY)); } catch(e) {}
  if (!saved) { render(); renderGoals(); renderDayTicks(); updateStudyUI(); return; }

  totalSeconds = saved.totalSeconds || 0;
  startEpoch   = saved.startEpoch   || null;
  emergency    = saved.emergency    || false;

  let restoreMsg = '';
  if (saved.goalEpoch) {
    const rem = Math.floor((saved.goalEpoch - Date.now()) / 1000);
    if (rem > 0) {
      goalEpoch = saved.goalEpoch;
      restoreMsg = '세션 복원됨 — ' + fmt(rem) + ' 남음';
      startTick();
    } else {
      goalEpoch = null; pausedRemaining = 0;
      restoreMsg = '세션 복원됨 — 타이머가 종료되었습니다';
    }
  } else if (saved.pausedRemaining > 0) {
    pausedRemaining = saved.pausedRemaining;
    restoreMsg = '세션 복원됨 — ' + fmt(pausedRemaining) + ' (일시정지 상태)';
  }

  render(); renderGoals(); renderDayTicks(); updateStudyUI();
  // Don't show the restore notice when the reload was triggered by a sync update.
  let syncReload = false;
  try { syncReload = sessionStorage.getItem('syncReload') === '1'; sessionStorage.removeItem('syncReload'); } catch(e) {}
  if (restoreMsg && !syncReload) setTimeout(() => showToast(restoreMsg), 300);
})();

// Memo widget: show expanded on entry (if a memo exists), then auto-collapse.
renderMemoWidget();
if (pinnedOrRecentNote()) {
  memoWidget.classList.add('open');
  renderMemoWidget();
  scheduleMemoAutoCollapse();
}
</script>
