<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="타이머">
<meta name="theme-color" content="#080808">
<title>타이머</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<!-- Tag in-app browsers (Instagram / Facebook) early so the cramped-layout
     CSS (smaller clock & study-time numbers) applies before first paint. -->
<script>if (/Instagram|FBAN|FBAV/i.test(navigator.userAgent)) document.documentElement.classList.add('inapp');</script>
<!-- Firebase SDK (compat) for optional account sync -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="app">

<!-- Header -->
<div class="header">
  <span class="header-title">타이머</span>
  <div class="status-row">
    <button class="acct-btn" id="setBtn" title="설정"></button>
    <button class="acct-btn" id="acctBtn" title="계정 / 동기화"></button>
    <span class="status-text" id="statusText"></span>
    <div class="dot" id="statusDot"></div>
  </div>
</div>

<!-- Display area -->
<div class="display-area">
  <button class="corner-btn left" id="goalBtn" title="목표 추가"></button>
  <button class="corner-btn right" id="emgBtn" title="비상 모드"></button>

  <div class="time-display" id="timeDisplay">00:00:00</div>
  <div class="time-sublabel">시간 : 분 : 초</div>

  <div class="progress-track" id="progressTrack">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="meta-row">
    <div class="elapsed-label" id="elapsedLabel">—</div>
    <div class="meta-sep" id="metaSep" style="display:none"></div>
    <div class="end-label" id="endLabel"></div>
  </div>
  <div class="meta-row2" id="metaRow2"></div>
</div>

<!-- Interactive panel: stopwatch + goals + controls.
     display:contents by default (stacks like normal flow); becomes its own
     column in the two-column landscape / desktop layouts. -->
<div class="side-panel">

<!-- Pinned / recent memo preview (expands on load, then auto-collapses) -->
<div class="memo-widget" id="memoWidget"></div>

<!-- Study stopwatch + Pomodoro merged: one card, switch between the two modes. -->
<div class="study-row combo" id="studyCard" data-mode="study">
  <div class="mode-switch">
    <button class="mode-tab" id="modeStudy" data-mode="study">공부</button>
    <button class="mode-tab" id="modePomo" data-mode="pomo">뽀모</button>
  </div>

  <div class="combo-pane" data-pane="study">
    <button class="sw-toggle" id="swToggle">▶</button>
    <div class="sw-info">
      <button class="sw-subject" id="swSubjectBtn" title="과목 선택"></button>
      <div class="sw-time" id="swTime">00:00:00</div>
      <div class="sw-goalbar" id="swGoalBar" style="display:none"><i></i></div>
    </div>
    <button class="dash-btn" id="notesBtn" title="메모장"></button>
    <button class="dash-btn" id="dashBtn" title="공부 대시보드"></button>
  </div>

  <div class="combo-pane" data-pane="pomo">
    <button class="sw-toggle pomo-toggle" id="pomoToggle">▶</button>
    <div class="sw-info">
      <div class="pomo-line">
        <span class="pomo-phase" id="pomoPhaseLabel">집중</span>
        <span class="pomo-dots" id="pomoDots"></span>
      </div>
      <div class="sw-time" id="pomoTime">25:00</div>
    </div>
    <button class="dash-btn" id="pomoReset" title="뽀모도로 초기화"></button>
  </div>
</div>

<!-- Goals list -->
<div class="goals-wrap" id="goalsWrap"></div>

<!-- Controls -->
<div class="controls">
  <div class="presets">
    <button class="preset-btn" data-h="24">24h</button>
    <button class="preset-btn" data-h="48">48h</button>
    <button class="preset-btn" data-h="72">72h</button>
    <button class="preset-btn" data-h="168">1주</button>
    <button class="preset-btn" data-h="336">2주</button>
    <button class="preset-btn" data-h="720">1달</button>
    <button class="preset-btn" id="calBtn" title="날짜로 설정" style="border-color:var(--accent);color:var(--accent);font-size:14px;"></button>
  </div>
  <div class="input-row">
    <div class="input-group">
      <input type="number" id="hInput" min="0" max="8760" placeholder="시간" inputmode="numeric">
    </div>
    <div class="colon">:</div>
    <div class="input-group">
      <input type="number" id="mInput" min="0" max="59" placeholder="분" inputmode="numeric">
    </div>
    <div class="colon">:</div>
    <div class="input-group">
      <input type="number" id="sInput" min="0" max="59" placeholder="초" inputmode="numeric">
    </div>
  </div>
  <div class="btn-row">
    <button class="btn" id="fsBtn" title="전체화면"></button>
    <button class="btn" id="resetBtn">초기화</button>
    <button class="btn primary" id="startBtn">시작</button>
  </div>
</div>
<!-- /side-panel -->
</div>

</div>
<!-- /app -->

<!-- Calendar modal -->
<div class="modal-overlay" id="calModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">시작 / 종료 설정</span>
      <button class="modal-close" id="calClose">✕</button>
    </div>
    <div class="cal-steps">
      <button class="cal-step" id="calStepStart">
        <span class="dot-s"></span>
        <span class="cal-step-text"><span class="cal-step-l">시작</span><span class="cal-step-v" id="calStartVal">—</span></span>
      </button>
      <span class="cal-step-arrow">→</span>
      <button class="cal-step" id="calStepEnd">
        <span class="dot-e"></span>
        <span class="cal-step-text"><span class="cal-step-l">종료</span><span class="cal-step-v" id="calEndVal">—</span></span>
      </button>
    </div>
    <div class="cal-nav">
      <button class="cal-arrow" id="calPrev">‹</button>
      <span class="cal-month-label" id="calMonthLabel"></span>
      <button class="cal-arrow" id="calNext">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-hint" id="calHint"></div>
    <div class="time-section">
      <div class="time-section-label"><span class="dot-s"></span>시작 시각</div>
      <div class="time-row">
        <div class="input-group"><label>시</label><input type="number" id="sH" min="0" max="23" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>분</label><input type="number" id="sM" min="0" max="59" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>초</label><input type="number" id="sS" min="0" max="59" inputmode="numeric"></div>
      </div>
    </div>
    <div class="time-section">
      <div class="time-section-label"><span class="dot-e"></span>종료 시각</div>
      <div class="time-row">
        <div class="input-group"><label>시</label><input type="number" id="eH" min="0" max="23" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>분</label><input type="number" id="eM" min="0" max="59" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>초</label><input type="number" id="eS" min="0" max="59" inputmode="numeric"></div>
      </div>
    </div>
    <button class="modal-confirm" id="calConfirm">설정</button>
  </div>
</div>

<!-- Goal creation modal -->
<div class="modal-overlay" id="goalModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">목표 추가</span>
      <button class="modal-close" id="goalModalClose">✕</button>
    </div>
    <div class="modal-field">
      <span class="modal-field-label">지금으로부터</span>
      <div class="goal-dur-row">
        <div class="input-group"><label>시간</label><input type="number" id="goalH" min="0" max="8760" placeholder="0" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>분</label><input type="number" id="goalM" min="0" max="59" placeholder="0" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>초</label><input type="number" id="goalS" min="0" max="59" placeholder="0" inputmode="numeric"></div>
      </div>
    </div>
    <div class="modal-field">
      <span class="modal-field-label">메모</span>
      <input type="text" class="goal-memo-input" id="goalMemoInput" placeholder="목표 메모 (선택)" maxlength="40">
    </div>
    <div class="modal-field">
      <span class="modal-field-label">깃발 색</span>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
    <button class="modal-confirm" id="goalConfirm">추가</button>
  </div>
</div>

<!-- Notes manager modal -->
<div class="modal-overlay" id="notesModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">메모장</span>
      <div class="notes-head-actions">
        <button class="note-reorder-toggle" id="notesReorderToggle" title="순서 변경"></button>
        <button class="modal-close" id="notesClose">✕</button>
      </div>
    </div>
    <div class="notes-actions">
      <button class="acct-secondary" id="newTextNote">+ 메모</button>
      <button class="acct-secondary" id="newListNote">+ 체크리스트</button>
    </div>
    <div id="notesList"></div>
  </div>
</div>

<!-- Note editor modal -->
<div class="modal-overlay" id="noteEditModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="noteEditTitle">메모 편집</span>
      <button class="modal-close" id="noteEditClose">✕</button>
    </div>
    <div class="modal-field">
      <span class="modal-field-label">제목</span>
      <input type="text" class="goal-memo-input" id="noteTitleInput" placeholder="제목" maxlength="60">
    </div>
    <div id="noteEditBody"></div>
    <label class="note-pin-row">
      <input type="checkbox" id="notePinInput"> <span>메인 화면에 고정</span>
    </label>
    <button class="modal-confirm" id="noteSave">저장</button>
    <button class="acct-secondary note-delete" id="noteDelete">삭제</button>
  </div>
</div>

<!-- Memo large view -->
<div class="modal-overlay" id="memoBigModal">
  <div class="modal memo-big">
    <div class="modal-header">
      <span class="modal-title" id="memoBigTitle">메모</span>
      <button class="modal-close" id="memoBigClose">✕</button>
    </div>
    <div id="memoBigBody"></div>
  </div>
</div>

<!-- Dashboard modal -->
<div class="modal-overlay" id="dashModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">공부 대시보드</span>
      <button class="modal-close" id="dashClose">✕</button>
    </div>
    <div id="dashBody"></div>
  </div>
</div>

<!-- Account / sync -->
<div class="modal-overlay" id="acctModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">계정 / 동기화</span>
      <button class="modal-close" id="acctClose">✕</button>
    </div>
    <div id="acctBody"></div>
  </div>
</div>

<!-- Subject picker modal -->
<div class="modal-overlay" id="subjModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">과목 선택</span>
      <button class="modal-close" id="subjClose">✕</button>
    </div>
    <div class="modal-field">
      <span class="modal-field-label">공부 중인 과목</span>
      <div class="subj-chips" id="subjChips"></div>
    </div>
    <div class="modal-field">
      <span class="modal-field-label">새 과목 추가</span>
      <div class="subj-add-row">
        <input type="text" class="goal-memo-input" id="subjAddInput" placeholder="예: 수학" maxlength="16">
        <button class="modal-confirm" id="subjAddBtn">추가</button>
      </div>
      <div class="subj-color-row" id="subjColorSwatches"></div>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="setModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">설정</span>
      <button class="modal-close" id="setClose">✕</button>
    </div>
    <div id="setBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- App scripts — loaded in dependency order; all share the global scope. -->
<script src="js/constants.js"></script>
<script src="js/storage.js"></script>
<script src="js/study.js"></script>
<script src="js/timer.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/sync.js"></script>
<script src="js/notes.js"></script>
</body>
</html>
