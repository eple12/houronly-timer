<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="타이머">
<meta name="theme-color" content="#080808">
<title>타이머</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080808;
  --surface:  #111;
  --surface2: #181818;
  --border:   #222;
  --border2:  #2e2e2e;
  --accent:   #d6f530;
  --text:     #eee;
  --sub:      #888;
  --dim:      #444;
  --danger:   #f04040;
  --emg-a:    #ff6b1a;
  --emg-b:    #ff2d00;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding: env(safe-area-inset-top,18px) 22px env(safe-area-inset-bottom,18px);
  gap: 0;
}

/* ─────────────────────── Header ─────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 14px;
  flex-shrink: 0;
}

.header-title {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dim);
}

.status-row {
  display: flex;
  align-items: center;
  gap: 7px;
}

.status-text {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--sub);
  text-transform: uppercase;
  transition: color 0.3s;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--dim);
  transition: background 0.3s, box-shadow 0.3s;
  flex-shrink: 0;
}
.dot.active {
  background: var(--accent);
  box-shadow: 0 0 7px var(--accent);
}
.dot.done { background: var(--danger); }

/* ─────────────────────── Display ─────────────────────── */
.display-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  position: relative;
  min-height: 0;
}

/* Corner icon buttons */
.corner-btn {
  position: absolute;
  top: 0;
  width: 32px;
  height: 32px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--surface);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
  color: var(--sub);
}
.corner-btn:active { background: var(--border); }
.corner-btn.left  { left: 0; }
.corner-btn.right { right: 0; }
.corner-btn.on { border-color: var(--emg-a); background: rgba(255,107,26,0.1); }

/* Time display */
.time-display {
  font-family: 'Space Mono', monospace;
  font-size: clamp(52px, 16vw, 92px);
  font-weight: 700;
  letter-spacing: -3px;
  line-height: 1;
  color: var(--text);
  transition: color 0.5s;
  text-align: center;
  margin-top: 8px;
}
.time-display.done      { color: var(--danger); animation: pulse 1.1s ease-in-out infinite; }
.time-display.emergency { color: var(--emg-a);  animation: flicker 0.9s ease-in-out infinite; }

@keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes flicker { 0%{color:var(--emg-a)} 50%{color:var(--emg-b)} 100%{color:var(--emg-a)} }

.time-sublabel {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--dim);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 4px;
}

/* ─────────────── Progress bar + flags ────────────────── */
.progress-track {
  width: 100%;
  max-width: 380px;
  /* padding-top creates vertical space for flags above the bar */
  padding-top: 28px;
  position: relative;
  margin-top: 8px;
  flex-shrink: 0;
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.5s linear;
}
.progress-fill.running {
  box-shadow: 0 0 8px rgba(214,245,48,0.5);
}
.progress-fill.emergency { background: var(--emg-a); }

/* ── Flags ── */
.goal-flag {
  position: absolute;
  /* bottom: -2px places flag so 2px of pole is below bar bottom (inserted look) */
  bottom: -2px;
  /* width:0 so the flag itself has no layout width; all parts are abs-positioned */
  width: 0;
  height: 0;
  pointer-events: auto;
}

.goal-flag-pole {
  position: absolute;
  bottom: 0;
  left: -1px;         /* center the 2px-wide pole */
  width: 2px;
  height: 22px;       /* extends from -2px (below bar) to 20px above bar */
  background: currentColor;
  border-radius: 1px 1px 0 0;
}

/* pointed stake tip below bar */
.goal-flag-pole::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: -2px;
  width: 0;
  height: 0;
  border-left:  3px solid transparent;
  border-right: 3px solid transparent;
  border-top:   4px solid currentColor;
}

.goal-flag-banner {
  position: absolute;
  /* banner sits just above the pole top */
  bottom: 22px;
  left: 1px;          /* banner's left edge aligns with right side of pole */
  width: 16px;
  height: 11px;
  background: currentColor;
  /* swallowtail / pennant shape: rectangle with triangular notch on right */
  clip-path: polygon(0 0, 100% 0, 68% 50%, 100% 100%, 0 100%);
  filter: brightness(1.05);
}

/* Meta info row */
.meta-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  margin-top: 4px;
}

.elapsed-label {
  font-size: 11px;
  color: var(--sub);
  letter-spacing: 0.05em;
}

.end-label {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.05em;
}

/* Restore banner */
.restore-banner {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 11px;
  color: var(--sub);
  text-align: center;
  margin-top: 8px;
}
.restore-banner b { color: var(--accent); font-weight: 500; }

/* ─────────────────────── Goals list ─────────────────── */
.goals-wrap {
  flex-shrink: 0;
  width: 100%;
  max-height: 170px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  padding: 10px 0 4px;
  gap: 5px;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.goals-wrap::-webkit-scrollbar { display: none; }

.goals-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
  padding: 0 1px 4px;
}

.goal-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 11px;
  background: var(--surface);
  border-radius: 9px;
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}

/* left accent bar in goal color */
.goal-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--goal-color, var(--dim));
  border-radius: 9px 0 0 9px;
}

.goal-icon {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  opacity: 0.9;
}

.goal-info {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 0;
}

.goal-memo-text {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

.goal-rem-text {
  font-size: 11px;
  color: var(--sub);
  font-family: 'Space Mono', monospace;
  letter-spacing: -0.5px;
  white-space: nowrap;
  flex-shrink: 0;
  padding-left: 8px;
}
.goal-rem-text.done-rem { color: var(--danger); }

.goal-del {
  flex-shrink: 0;
  background: none;
  border: none;
  color: var(--dim);
  font-size: 13px;
  cursor: pointer;
  padding: 0 0 0 6px;
  line-height: 1;
  -webkit-appearance: none;
  transition: color 0.15s;
  display: flex;
  align-items: center;
}
.goal-del:active { color: var(--danger); }

/* ─────────────────────── Controls ───────────────────── */
.controls {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 9px;
  padding-bottom: 4px;
}

/* Preset row */
.presets {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.preset-btn {
  flex: 1;
  min-width: 0;
  padding: 8px 4px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  white-space: nowrap;
  -webkit-appearance: none;
}
.preset-btn:active {
  color: var(--accent);
  border-color: var(--accent);
  background: rgba(214,245,48,0.06);
}

/* Input row */
.input-row {
  display: flex;
  gap: 6px;
  align-items: center;
}

.input-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.input-group label {
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--dim);
  text-align: center;
  text-transform: uppercase;
}

.input-group input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 9px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  padding: 11px 4px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.input-group input:focus { border-color: var(--accent); }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

.colon {
  font-family: 'Space Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--dim);
  padding-bottom: 16px;
  flex-shrink: 0;
}

/* Button row */
.btn-row { display: flex; gap: 7px; }

.btn {
  flex: 1;
  padding: 13px 8px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  -webkit-appearance: none;
  letter-spacing: -0.3px;
}
.btn:active { transform: scale(0.96); background: var(--surface2); }
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a0a0a;
  font-weight: 700;
}
.btn.primary:active { background: #c4e020; border-color: #c4e020; }
.btn:disabled { opacity: 0.28; pointer-events: none; }

/* ──────────────────────── Modals ────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-width: 480px;
  padding: 22px 22px 36px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-height: 92dvh;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-title {
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--sub);
}

.modal-close {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 19px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}
.modal-close:active { color: var(--text); }

/* ── Calendar ── */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.cal-month-label {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.cal-arrow {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-size: 15px;
  width: 32px;
  height: 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-appearance: none;
}
.cal-arrow:active { background: var(--border); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.cal-dow {
  font-size: 10px;
  color: var(--dim);
  text-align: center;
  padding: 4px 0;
}

.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 7px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  color: var(--text);
  background: none;
  transition: background 0.1s;
  -webkit-appearance: none;
}
.cal-day.today    { border-color: var(--dim); }
.cal-day.sel-start { background: #3a7fff; color: #fff; font-weight: 700; border-color: #3a7fff; }
.cal-day.sel-end   { background: var(--accent); color: #0a0a0a; font-weight: 700; border-color: var(--accent); }
.cal-day.in-range  { background: rgba(214,245,48,0.1); }
.cal-day:not(:empty):hover { background: var(--border); }

/* Time section inside modal */
.time-section { display: flex; flex-direction: column; gap: 8px; }

.time-section-label {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
  display: flex;
  align-items: center;
  gap: 7px;
}
.time-section-label .dot-s { width: 7px; height: 7px; border-radius: 50%; background: #3a7fff; display: inline-block; flex-shrink: 0; }
.time-section-label .dot-e { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; flex-shrink: 0; }

.time-row { display: flex; gap: 6px; align-items: center; }
.time-row .input-group input { font-size: 17px; padding: 9px 4px; }
.time-row .colon { font-size: 15px; padding-bottom: 14px; }

.modal-confirm {
  width: 100%;
  padding: 14px;
  border-radius: 11px;
  background: var(--accent);
  border: none;
  color: #0a0a0a;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
  letter-spacing: -0.3px;
}
.modal-confirm:active { opacity: 0.82; }

/* ── Goal modal extras ── */
.modal-field { display: flex; flex-direction: column; gap: 8px; }

.modal-field-label {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
}

.goal-duration-row { display: flex; gap: 6px; align-items: center; }
.goal-duration-row .input-group input { font-size: 17px; padding: 9px 4px; }
.goal-duration-row .colon { font-size: 15px; padding-bottom: 14px; }

.goal-memo-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 9px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.goal-memo-input:focus { border-color: var(--accent); }
.goal-memo-input::placeholder { color: var(--dim); }

/* Color swatches */
.color-swatches {
  display: flex;
  gap: 9px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  outline: 2px solid transparent;
  outline-offset: 2px;
  transition: transform 0.15s, outline-color 0.15s;
  -webkit-appearance: none;
  flex-shrink: 0;
}
.color-swatch.selected {
  outline-color: var(--text);
  transform: scale(1.18);
}
.color-swatch:active { transform: scale(0.9); }

/* ─────────────── Calendar legend (inline) ────────────── */
.cal-legend {
  font-size: 10px;
  color: var(--dim);
  text-align: center;
  margin-top: -8px;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-title">타이머</span>
  <div class="status-row">
    <span class="status-text" id="statusText"></span>
    <div class="dot" id="statusDot"></div>
  </div>
</div>

<!-- Display area -->
<div class="display-area">
  <button class="corner-btn left" id="goalBtn" title="목표 추가">🚩</button>
  <button class="corner-btn right" id="emgBtn" title="비상 모드">⚠️</button>

  <div class="time-display" id="timeDisplay">00:00:00</div>
  <div class="time-sublabel">시간 : 분 : 초</div>

  <!-- Progress track: padding-top reserves space for flags -->
  <div class="progress-track" id="progressTrack">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="meta-row">
    <div class="elapsed-label" id="elapsedLabel">—</div>
    <div class="end-label"     id="endLabel"></div>
  </div>

  <div class="restore-banner" id="restoreBanner">
    세션 복원됨 — <b id="restoreInfo"></b>
  </div>
</div>

<!-- Goals list (between display and controls) -->
<div class="goals-wrap" id="goalsWrap"></div>

<!-- Controls -->
<div class="controls">
  <div class="presets">
    <button class="preset-btn" data-h="24">24h</button>
    <button class="preset-btn" data-h="48">48h</button>
    <button class="preset-btn" data-h="72">72h</button>
    <button class="preset-btn" data-h="168">1주</button>
    <button class="preset-btn" data-h="336">2주</button>
    <button class="preset-btn" data-h="720">1달</button>
    <button class="preset-btn" id="calBtn" style="border-color:var(--accent);color:var(--accent);font-size:14px;">📅</button>
  </div>
  <div class="input-row">
    <div class="input-group">
      <label>시간</label>
      <input type="number" id="hInput" min="0" max="8760" placeholder="0" inputmode="numeric">
    </div>
    <div class="colon">:</div>
    <div class="input-group">
      <label>분</label>
      <input type="number" id="mInput" min="0" max="59" placeholder="0" inputmode="numeric">
    </div>
    <div class="colon">:</div>
    <div class="input-group">
      <label>초</label>
      <input type="number" id="sInput" min="0" max="59" placeholder="0" inputmode="numeric">
    </div>
  </div>
  <div class="btn-row">
    <button class="btn" id="fsBtn">⛶</button>
    <button class="btn" id="resetBtn">초기화</button>
    <button class="btn primary" id="startBtn">시작</button>
    <button class="btn" id="pauseBtn" disabled>일시정지</button>
  </div>
</div>

<!-- Calendar modal -->
<div class="modal-overlay" id="calModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">시작 / 종료 설정</span>
      <button class="modal-close" id="calClose">✕</button>
    </div>

    <div class="cal-nav">
      <button class="cal-arrow" id="calPrev">‹</button>
      <span class="cal-month-label" id="calMonthLabel"></span>
      <button class="cal-arrow" id="calNext">›</button>
    </div>

    <div class="cal-legend">🔵 시작일 &nbsp;|&nbsp; 🟡 종료일</div>

    <div class="cal-grid" id="calGrid"></div>

    <div class="time-section">
      <div class="time-section-label"><span class="dot-s"></span>시작 시각</div>
      <div class="time-row">
        <div class="input-group"><label>시</label><input type="number" id="sH" min="0" max="23" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>분</label><input type="number" id="sM" min="0" max="59" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>초</label><input type="number" id="sS" min="0" max="59" inputmode="numeric"></div>
      </div>
    </div>

    <div class="time-section">
      <div class="time-section-label"><span class="dot-e"></span>종료 시각</div>
      <div class="time-row">
        <div class="input-group"><label>시</label><input type="number" id="eH" min="0" max="23" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>분</label><input type="number" id="eM" min="0" max="59" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>초</label><input type="number" id="eS" min="0" max="59" inputmode="numeric"></div>
      </div>
    </div>

    <button class="modal-confirm" id="calConfirm">설정</button>
  </div>
</div>

<!-- Goal creation modal -->
<div class="modal-overlay" id="goalModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">목표 추가</span>
      <button class="modal-close" id="goalModalClose">✕</button>
    </div>

    <div class="modal-field">
      <span class="modal-field-label">지금으로부터</span>
      <div class="goal-duration-row">
        <div class="input-group"><label>시간</label><input type="number" id="goalH" min="0" max="8760" placeholder="0" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>분</label><input type="number" id="goalM" min="0" max="59" placeholder="0" inputmode="numeric"></div>
        <div class="colon">:</div>
        <div class="input-group"><label>초</label><input type="number" id="goalS" min="0" max="59" placeholder="0" inputmode="numeric"></div>
      </div>
    </div>

    <div class="modal-field">
      <span class="modal-field-label">메모</span>
      <input type="text" class="goal-memo-input" id="goalMemoInput" placeholder="목표 메모 (선택)" maxlength="40">
    </div>

    <div class="modal-field">
      <span class="modal-field-label">깃발 색</span>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>

    <button class="modal-confirm" id="goalConfirm">추가</button>
  </div>
</div>

<script>
const STORE_KEY = 'timer_v4';
const GOALS_KEY = 'timer_goals_v1';

const GOAL_COLORS = [
  '#ff4040',
  '#ff8800',
  '#d6f530',
  '#30f58a',
  '#3a8fff',
  '#a855f7',
  '#f542c8',
  '#00d4ff',
];

// ── Timer state ────────────────────────────────────────
let goalEpoch       = null;
let startEpoch      = null;
let pausedRemaining = null;
let totalSeconds    = 0;
let rafId           = null;
let lastDisplayed   = -1;
let emergency       = false;

// ── Goals state ────────────────────────────────────────
let goals         = [];
let selectedColor = GOAL_COLORS[0];
let lastGoalSec   = -1;

// ── DOM refs ───────────────────────────────────────────
const $ = id => document.getElementById(id);

const timeDisplay   = $('timeDisplay');
const elapsedLabel  = $('elapsedLabel');
const endLabel      = $('endLabel');
const progressFill  = $('progressFill');
const progressTrack = $('progressTrack');
const statusDot     = $('statusDot');
const statusText    = $('statusText');
const restoreBanner = $('restoreBanner');
const restoreInfo   = $('restoreInfo');
const startBtn      = $('startBtn');
const pauseBtn      = $('pauseBtn');
const resetBtn      = $('resetBtn');
const hInput        = $('hInput');
const mInput        = $('mInput');
const sInput        = $('sInput');
const emgBtn        = $('emgBtn');
const goalsWrap     = $('goalsWrap');

// ── Formatters ─────────────────────────────────────────
function fmt(secs) {
  secs = Math.max(0, secs);
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function fmtDate(ms) {
  const d = new Date(ms);
  return `종료 ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} `
       + `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function fmtElapsed(secs) {
  if (secs <= 0) return '—';
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
  const p = [];
  if (h) p.push(`${h}시간`);
  if (m) p.push(`${m}분`);
  if (s || !p.length) p.push(`${s}초`);
  return '경과 ' + p.join(' ');
}

function fmtGoalRem(endEpoch) {
  const rem = Math.max(0, Math.floor((endEpoch - Date.now()) / 1000));
  if (rem === 0) return '완료';
  const h = Math.floor(rem / 3600);
  const m = Math.floor((rem % 3600) / 60);
  const s = rem % 60;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  if (m > 0) return `${m}m ${String(s).padStart(2,'0')}s`;
  return `${s}s`;
}

function escHtml(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Timer state helpers ────────────────────────────────
function getRem() {
  if (goalEpoch !== null) return Math.max(0, Math.floor((goalEpoch - Date.now()) / 1000));
  if (pausedRemaining !== null) return pausedRemaining;
  return 0;
}
function isRunning() { return goalEpoch !== null; }
function isPaused()  { return goalEpoch === null && pausedRemaining !== null; }
function isIdle()    { return goalEpoch === null && pausedRemaining === null; }

// ── Persistence ────────────────────────────────────────
function save() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(
      { goalEpoch, startEpoch, pausedRemaining, totalSeconds, emergency }
    ));
  } catch(e) {}
}
function clearSave() { try { localStorage.removeItem(STORE_KEY); } catch(e) {} }
function saveGoals() { try { localStorage.setItem(GOALS_KEY, JSON.stringify(goals)); } catch(e) {} }
function loadGoals() { try { goals = JSON.parse(localStorage.getItem(GOALS_KEY)) || []; } catch(e) { goals = []; } }

// ── Flag rendering ─────────────────────────────────────
function renderGoalFlags() {
  // Remove old flags
  progressTrack.querySelectorAll('.goal-flag').forEach(f => f.remove());

  // Determine reference span for positioning
  const refStart = startEpoch;
  const refEnd   = goalEpoch
    ?? (startEpoch && totalSeconds > 0 ? startEpoch + totalSeconds * 1000 : null);

  if (!refStart || !refEnd) return;
  const span = refEnd - refStart;
  if (span <= 0) return;

  const barWidth = progressTrack.offsetWidth;

  goals.forEach(g => {
    const pct = ((g.endEpoch - refStart) / span) * 100;
    if (pct < 0 || pct > 100) return;

    const flag = document.createElement('div');
    flag.className = 'goal-flag';
    flag.style.color = g.color;
    // Position relative to the track's width; flags are siblings of progress-bar inside track
    flag.style.left = pct.toFixed(3) + '%';
    flag.title = g.memo || '목표';

    flag.innerHTML =
      `<div class="goal-flag-pole"></div>` +
      `<div class="goal-flag-banner"></div>`;

    progressTrack.appendChild(flag);
  });
}

// ── Goals list rendering ───────────────────────────────
function renderGoals() {
  if (goals.length === 0) {
    goalsWrap.innerHTML = '';
    return;
  }

  const header = `<div class="goals-label">목표</div>`;
  const items = goals.map(g => {
    const rem = Math.max(0, Math.floor((g.endEpoch - Date.now()) / 1000));
    const remText  = fmtGoalRem(g.endEpoch);
    const remClass = rem === 0 ? 'goal-rem-text done-rem' : 'goal-rem-text';
    return `
      <div class="goal-item" data-gid="${g.id}" style="--goal-color:${g.color}">
        <div class="goal-icon">
          <svg width="13" height="15" viewBox="0 0 13 15" fill="none" style="color:${g.color}">
            <line x1="1.5" y1="0" x2="1.5" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M1.5 0.5 L13 5.5 L1.5 10.5 Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="goal-info">
          <span class="goal-memo-text">${escHtml(g.memo || '목표')}</span>
          <span class="${remClass}" data-rem="${g.id}">${remText}</span>
        </div>
        <button class="goal-del" data-del="${g.id}">✕</button>
      </div>`;
  }).join('');

  goalsWrap.innerHTML = header + items;

  goalsWrap.querySelectorAll('.goal-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.del);
      goals = goals.filter(g => g.id !== id);
      saveGoals();
      renderGoals();
      renderGoalFlags();
    });
  });
}

function updateGoalTimes() {
  goals.forEach(g => {
    const el = goalsWrap.querySelector(`[data-rem="${g.id}"]`);
    if (!el) return;
    const rem = Math.max(0, Math.floor((g.endEpoch - Date.now()) / 1000));
    el.textContent = fmtGoalRem(g.endEpoch);
    el.className = rem === 0 ? 'goal-rem-text done-rem' : 'goal-rem-text';
  });
}

// ── Core render ────────────────────────────────────────
function render() {
  const rem  = getRem();
  const done = rem === 0 && totalSeconds > 0;

  if (rem !== lastDisplayed) {
    lastDisplayed = rem;
    timeDisplay.textContent = fmt(rem);
  }

  timeDisplay.classList.toggle('done',      done && !emergency);
  timeDisplay.classList.toggle('emergency', emergency && !done);

  // Progress fill
  let pct = 0;
  if (startEpoch && goalEpoch) {
    const span    = goalEpoch - startEpoch;
    const elapsed = Date.now() - startEpoch;
    pct = Math.min(100, Math.max(0, (elapsed / span) * 100));
    elapsedLabel.textContent = fmtElapsed(Math.floor(elapsed / 1000));
  } else if (totalSeconds > 0) {
    const elapsed = totalSeconds - rem;
    pct = Math.min(100, (elapsed / totalSeconds) * 100);
    elapsedLabel.textContent = fmtElapsed(elapsed);
  } else {
    elapsedLabel.textContent = '—';
  }
  progressFill.style.width = pct.toFixed(3) + '%';
  progressFill.classList.toggle('running',   isRunning() && !emergency);
  progressFill.classList.toggle('emergency', emergency);

  endLabel.textContent = goalEpoch ? fmtDate(goalEpoch) : '';

  // Status
  if (done) {
    statusDot.className = 'dot done';
    statusText.textContent = '완료';
  } else if (isRunning()) {
    statusDot.className = 'dot active';
    statusText.textContent = '진행중';
  } else if (isPaused()) {
    statusDot.className = 'dot';
    statusText.textContent = '일시정지';
  } else {
    statusDot.className = 'dot';
    statusText.textContent = '';
  }

  // Buttons
  startBtn.disabled   = isRunning() || done;
  startBtn.textContent = isRunning() ? '실행중' : (isPaused() ? '계속' : '시작');
  pauseBtn.disabled   = isIdle() || done;
  pauseBtn.textContent = isPaused() ? '계속' : '일시정지';

  const locked = isRunning();
  [hInput, mInput, sInput].forEach(inp => {
    inp.disabled     = locked;
    inp.style.opacity = locked ? '0.25' : '1';
  });
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.disabled = locked;
    b.style.opacity      = locked ? '0.25' : '1';
    b.style.pointerEvents = locked ? 'none' : '';
  });

  emgBtn.classList.toggle('on', emergency);

  // Goal flags (fast DOM update)
  renderGoalFlags();

  // Goal remaining time — once per second
  const nowSec = Math.floor(Date.now() / 1000);
  if (nowSec !== lastGoalSec) {
    lastGoalSec = nowSec;
    updateGoalTimes();
  }
}

// ── Animation loop ─────────────────────────────────────
function startTick() {
  if (rafId) cancelAnimationFrame(rafId);
  function loop() {
    render();
    if (getRem() === 0 && goalEpoch !== null) {
      goalEpoch = null;
      if ('vibrate' in navigator) navigator.vibrate([400,200,400,200,400]);
      render(); save(); rafId = null; return;
    }
    save();
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

// Keep goal times fresh even when no main timer is running
setInterval(() => {
  if (goals.length > 0 && !rafId) {
    updateGoalTimes();
    renderGoalFlags();
  }
}, 1000);

// ── Timer actions ──────────────────────────────────────
function doStart() {
  const rem = getRem();
  if (rem <= 0) return;
  if (!startEpoch) startEpoch = Date.now();
  goalEpoch       = Date.now() + rem * 1000;
  pausedRemaining = null;
  lastDisplayed   = -1;
  startTick(); render(); save();
}

function doPause() {
  if (!isRunning()) return;
  pausedRemaining = getRem();
  goalEpoch = null;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  render(); save();
}

function doReset() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  goalEpoch = null; startEpoch = null; pausedRemaining = null;
  totalSeconds = 0; lastDisplayed = -1;
  render(); clearSave();
  restoreBanner.style.display = 'none';
}

function setDuration(secs) {
  doReset();
  totalSeconds    = secs;
  pausedRemaining = secs;
  render(); save();
}

// ── Control events ─────────────────────────────────────
startBtn.addEventListener('click', () => {
  if (isPaused()) { doStart(); return; }
  if (isIdle()) {
    const h = parseInt(hInput.value)||0, m = parseInt(mInput.value)||0, s = parseInt(sInput.value)||0;
    const t = h*3600 + m*60 + s;
    if (!t) return;
    totalSeconds = t; pausedRemaining = t;
  }
  doStart();
});

pauseBtn.addEventListener('click', () => {
  if (isRunning()) doPause();
  else if (isPaused()) doStart();
});

resetBtn.addEventListener('click', doReset);

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (isRunning() || !btn.dataset.h) return;
    hInput.value = btn.dataset.h; mInput.value = 0; sInput.value = 0;
    setDuration(parseInt(btn.dataset.h) * 3600);
  });
});

[hInput, mInput, sInput].forEach(inp => {
  inp.addEventListener('change', () => {
    if (isRunning()) return;
    const h = parseInt(hInput.value)||0, m = parseInt(mInput.value)||0, s = parseInt(sInput.value)||0;
    const t = h*3600 + m*60 + s;
    if (t) setDuration(t);
  });
});

// ── Emergency ──────────────────────────────────────────
emgBtn.addEventListener('click', () => { emergency = !emergency; render(); save(); });

// ── Fullscreen ─────────────────────────────────────────
const fsBtn = $('fsBtn');
fsBtn.addEventListener('click', () => {
  const el  = document.documentElement;
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFs) {
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if (req) req.call(el);
  } else {
    const ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
    if (ex) ex.call(document);
  }
});
['fullscreenchange','webkitfullscreenchange'].forEach(ev => {
  document.addEventListener(ev, () => {
    fsBtn.textContent = (document.fullscreenElement || document.webkitFullscreenElement) ? '✕' : '⛶';
  });
});

// ── Wake lock ──────────────────────────────────────────
async function reqWakeLock() {
  if ('wakeLock' in navigator) try { await navigator.wakeLock.request('screen'); } catch(e) {}
}
reqWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') reqWakeLock();
});

// ── Calendar modal ─────────────────────────────────────
const calModal    = $('calModal');
const calMonthLbl = $('calMonthLabel');
const calGridEl   = $('calGrid');

let calYear, calMonth, selStart = null, selEnd = null, picking = 'start';

const DAYS   = ['일','월','화','수','목','금','토'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function openCal() {
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  selStart = null; selEnd = null; picking = 'start';
  $('sH').value = now.getHours(); $('sM').value = now.getMinutes(); $('sS').value = now.getSeconds();
  $('eH').value = ''; $('eM').value = ''; $('eS').value = '';
  renderCal(); calModal.classList.add('open');
}

function dateKey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function sameDay(a, b) { return a && b && dateKey(a) === dateKey(b); }
function between(d, a, b) {
  if (!a || !b) return false;
  const t = d.getTime(), ta = a.getTime(), tb = b.getTime();
  return t > Math.min(ta,tb) && t < Math.max(ta,tb);
}

function renderCal() {
  calMonthLbl.textContent = `${calYear}년 ${MONTHS[calMonth]}`;
  calGridEl.innerHTML = '';
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d;
    calGridEl.appendChild(el);
  });
  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today       = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < firstDay; i++) calGridEl.appendChild(document.createElement('div'));
  for (let d = 1; d <= daysInMonth; d++) {
    const btn     = document.createElement('button');
    const thisDay = new Date(calYear, calMonth, d);
    btn.className = 'cal-day';
    btn.textContent = d;
    if (thisDay.toDateString() === today.toDateString()) btn.classList.add('today');
    if (sameDay(thisDay, selStart)) btn.classList.add('sel-start');
    else if (sameDay(thisDay, selEnd)) btn.classList.add('sel-end');
    else if (selStart && selEnd && between(thisDay, selStart, selEnd)) btn.classList.add('in-range');
    btn.addEventListener('click', () => {
      const clicked = new Date(calYear, calMonth, d);
      if (picking === 'start') {
        selStart = clicked;
        if (sameDay(clicked, today)) {
          const now = new Date();
          $('sH').value = now.getHours(); $('sM').value = now.getMinutes(); $('sS').value = now.getSeconds();
        }
        picking = 'end';
      } else {
        if (clicked < selStart) { selEnd = selStart; selStart = clicked; }
        else selEnd = clicked;
        picking = 'start';
      }
      renderCal();
    });
    calGridEl.appendChild(btn);
  }
}

$('calPrev').addEventListener('click', () => { calMonth--; if (calMonth<0){calMonth=11;calYear--;} renderCal(); });
$('calNext').addEventListener('click', () => { calMonth++; if (calMonth>11){calMonth=0;calYear++;} renderCal(); });
$('calClose').addEventListener('click', () => calModal.classList.remove('open'));
calModal.addEventListener('click', e => { if (e.target === calModal) calModal.classList.remove('open'); });

$('calConfirm').addEventListener('click', () => {
  if (!selStart || !selEnd) { alert('시작일과 종료일을 모두 선택해주세요.'); return; }
  const sh = parseInt($('sH').value)||0, sm = parseInt($('sM').value)||0, ss = parseInt($('sS').value)||0;
  const eh = parseInt($('eH').value)||0, em = parseInt($('eM').value)||0, es = parseInt($('eS').value)||0;
  const start = new Date(selStart); start.setHours(sh, sm, ss, 0);
  const end   = new Date(selEnd);   end.setHours(eh, em, es, 0);
  if (end <= start) { alert('종료 시각이 시작 시각보다 늦어야 해요.'); return; }
  const span    = Math.floor((end - start) / 1000);
  const remSecs = Math.floor((end - Date.now()) / 1000);
  calModal.classList.remove('open');
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  startEpoch = start.getTime(); goalEpoch = end.getTime();
  totalSeconds = span; pausedRemaining = null; lastDisplayed = -1;
  restoreBanner.style.display = 'none';
  if (remSecs > 0) startTick();
  else { goalEpoch = null; pausedRemaining = 0; }
  render(); save();
});

$('calBtn').addEventListener('click', () => { if (!isRunning()) openCal(); });

// ── Goal modal ─────────────────────────────────────────
const goalModal = $('goalModal');

function buildColorSwatches() {
  const container = $('colorSwatches');
  container.innerHTML = '';
  GOAL_COLORS.forEach(color => {
    const btn = document.createElement('button');
    btn.className = 'color-swatch' + (color === selectedColor ? ' selected' : '');
    btn.style.background = color;
    btn.title = color;
    btn.addEventListener('click', () => {
      selectedColor = color;
      container.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      btn.classList.add('selected');
    });
    container.appendChild(btn);
  });
}

$('goalBtn').addEventListener('click', () => {
  $('goalH').value = ''; $('goalM').value = ''; $('goalS').value = '';
  $('goalMemoInput').value = '';
  buildColorSwatches();
  goalModal.classList.add('open');
});

$('goalModalClose').addEventListener('click', () => goalModal.classList.remove('open'));
goalModal.addEventListener('click', e => { if (e.target === goalModal) goalModal.classList.remove('open'); });

$('goalConfirm').addEventListener('click', () => {
  const h = parseInt($('goalH').value)||0;
  const m = parseInt($('goalM').value)||0;
  const s = parseInt($('goalS').value)||0;
  const totalSec = h*3600 + m*60 + s;
  if (totalSec <= 0) { alert('시간을 입력해주세요.'); return; }
  const memo = $('goalMemoInput').value.trim();
  goals.push({ id: Date.now(), memo, endEpoch: Date.now() + totalSec * 1000, color: selectedColor });
  saveGoals();
  renderGoals();
  renderGoalFlags();
  goalModal.classList.remove('open');
});

// ── Restore ────────────────────────────────────────────
loadGoals();

(function restore() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(STORE_KEY)); } catch(e) {}
  if (!saved) { render(); renderGoals(); return; }

  totalSeconds = saved.totalSeconds || 0;
  startEpoch   = saved.startEpoch   || null;
  emergency    = saved.emergency    || false;

  if (saved.goalEpoch) {
    const rem = Math.floor((saved.goalEpoch - Date.now()) / 1000);
    if (rem > 0) {
      goalEpoch = saved.goalEpoch;
      restoreInfo.textContent = fmt(rem) + ' 남음';
      restoreBanner.style.display = 'block';
      startTick();
    } else {
      goalEpoch = null; pausedRemaining = 0;
      restoreInfo.textContent = '타이머가 종료되었습니다';
      restoreBanner.style.display = 'block';
    }
  } else if (saved.pausedRemaining > 0) {
    pausedRemaining = saved.pausedRemaining;
    restoreInfo.textContent = fmt(pausedRemaining) + ' (일시정지 상태)';
    restoreBanner.style.display = 'block';
  }

  render();
  renderGoals();
})();
</script>
</body>
