<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="타이머">
<meta name="theme-color" content="#080808">
<title>타이머</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #080808;
  --surface: #101010;
  --surf2:   #191919;
  --border:  #202020;
  --bord2:   #2c2c2c;
  --accent:  #cef231;
  --text:    #efefef;
  --sub:     #b0b0b0;
  --dim:     #828282;
  --danger:  #f04444;
  --good:    #2edf7a;
  --emg-a:   #ff6b1a;
  --emg-b:   #ff2d00;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

body {
  display: flex;
  justify-content: center;
  height: 100dvh;
  padding:
    max(env(safe-area-inset-top), 14px)
    max(env(safe-area-inset-right), 20px)
    max(env(safe-area-inset-bottom), 14px)
    max(env(safe-area-inset-left), 20px);
}

/* Centered content column — caps width on large screens so the layout
   never stretches awkwardly wide on tablets / laptops. */
.app {
  width: 100%;
  max-width: var(--maxw, 460px);
  height: 100%;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

/* By default the panel is transparent to layout (its children stack in the
   normal column flow). The landscape / desktop media queries below turn it
   into a real flex column for the two-column split. */
.side-panel { display: contents; }

/* ═══════════════════════════ Header ══════════════════════════ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 16px;
  flex-shrink: 0;
}
.header-title {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--dim);
}
.status-row { display: flex; align-items: center; gap: 8px; }
.status-text {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--sub);
  transition: color 0.3s;
  min-width: 4em;
  text-align: right;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  transition: background 0.3s, box-shadow 0.3s;
  flex-shrink: 0;
}
.dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.dot.done   { background: var(--danger); }

/* ═════════════════════════ Display area ══════════════════════ */
.display-area {
  flex: 1 0 auto;          /* grow to center the clock, but never shrink it */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  position: relative;
  min-height: 0;
}
.corner-btn {
  position: absolute;
  top: 0;
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  -webkit-appearance: none;
}
.corner-btn:active { background: var(--surf2); }
.corner-btn.left  { left: 0; }
.corner-btn.right { right: 0; }
.corner-btn.on    { border-color: var(--emg-a); background: rgba(255,107,26,0.1); }

.time-display {
  font-family: 'Space Mono', monospace;
  /* min(vw,vh) keeps the clock within BOTH dimensions, so it never gets
     clipped in landscape; sized to clear the corner buttons horizontally. */
  font-size: clamp(42px, min(13.5vw, 18vh), 100px);
  font-weight: 700;
  letter-spacing: -3px;
  line-height: 1;
  color: var(--text);
  transition: color 0.5s;
  text-align: center;
  margin-top: 6px;
  max-width: 100%;
}
.time-display.done      { color: var(--danger); animation: pulse 1.1s ease-in-out infinite; }
.time-display.emergency { color: var(--emg-a);  animation: flicker 0.9s ease-in-out infinite; }
@keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.28} }
@keyframes flicker { 0%{color:var(--emg-a)} 50%{color:var(--emg-b)} 100%{color:var(--emg-a)} }

.time-sublabel {
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--dim);
  text-transform: uppercase;
  text-align: center;
  margin-top: 2px;
  margin-bottom: 6px;
}

/* ═══════════════════════ Progress + Flags ═══════════════════ */
/*
  .progress-track: position:relative wrapper.
  padding-top reserves vertical space for flags above the bar; that value
  (BAR_Y) equals the SVG y where the bar sits. Flag SVGs are top:0 so their
  y-coords map 1:1 to pixels from the track top.
*/
.progress-track {
  width: 100%;
  max-width: 400px;
  padding-top: 28px;          /* = BAR_Y in flag SVG coordinates */
  position: relative;
  flex-shrink: 0;
  margin-top: 4px;
}
.progress-bar {
  width: 100%;
  height: 4px;
  background: var(--bord2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.5s linear;
}
.progress-fill.running   { box-shadow: 0 0 10px rgba(206,242,49,0.45); }
.progress-fill.emergency { background: var(--emg-a); box-shadow: 0 0 10px rgba(255,107,26,0.45); }

/* Day boundary ticks (local midnight) */
.day-tick {
  position: absolute;
  top: 24px;            /* spans across the 4px bar at y=28..32 */
  width: 1px;
  height: 12px;
  background: rgba(255,255,255,0.16);
  transform: translateX(-0.5px);
  pointer-events: none;
}

/* Flags: tiny absolutely-positioned anchor; the SVG draws pole+banner.
   The anchor's left == goal position; pole LEFT edge sits on that point so
   nothing of the flag pokes left of its marker. */
.goal-flag {
  position: absolute;
  top: 0;
  width: 0; height: 0;
  pointer-events: auto;
  cursor: default;
}
.goal-flag svg {
  position: absolute;
  top: 0;
  left: 0;
  overflow: visible;
  pointer-events: none;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.55));
}

/* ───── Meta rows ───── */
.meta-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 8px;
}
.elapsed-label { font-size: 12px; color: var(--sub); }
.meta-sep { width: 1px; height: 11px; background: var(--border); flex-shrink: 0; }
.end-label { font-size: 11px; color: var(--dim); }

.meta-row2 {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 6px;
  flex-wrap: wrap;
  min-height: 16px;
}
.dday-chip {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.3px;
  border: 1px solid rgba(206,242,49,0.35);
  border-radius: 6px;
  padding: 2px 8px;
}
.dday-chip.past { color: var(--dim); border-color: var(--border); }
.proj-text { font-size: 11px; color: var(--sub); }
.proj-text b { color: var(--text); font-weight: 600; }

.restore-banner {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 11px;
  color: var(--sub);
  text-align: center;
  margin-top: 10px;
}
.restore-banner b { color: var(--accent); font-weight: 600; }

/* ═══════════════════════ Study stopwatch row ════════════════ */
.study-row {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  margin: 10px 0 0;
}
.sw-toggle {
  flex-shrink: 0;
  width: 42px; height: 42px;
  border-radius: 10px;
  border: 1px solid var(--bord2);
  background: var(--surf2);
  color: var(--text);
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, transform 0.1s;
  -webkit-appearance: none;
}
.sw-toggle:active { transform: scale(0.94); }
.sw-toggle.running {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a0a0a;
  box-shadow: 0 0 12px rgba(206,242,49,0.4);
}
.sw-info { flex: 1; min-width: 0; }
.sw-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
}
.sw-time {
  font-family: 'Space Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--text);
  line-height: 1.1;
}
.sw-time.running { color: var(--accent); }
.dash-btn {
  flex-shrink: 0;
  width: 42px; height: 42px;
  border-radius: 10px;
  border: 1px solid var(--bord2);
  background: var(--surf2);
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  -webkit-appearance: none;
}
.dash-btn:active { background: var(--border); }

/* ═══════════════════════════ Goals list ══════════════════════ */
.goals-wrap {
  /* Absorbs leftover vertical space and scrolls when goals overflow, so the
     list never pushes into (and overlaps) the clock or controls. */
  flex: 0 1 auto;
  min-height: 0;
  width: 100%;
  overflow-y: auto;
  padding: 10px 0 2px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.goals-wrap::-webkit-scrollbar { display: none; }
.goals-wrap:empty { padding: 0; }
.goals-section-label {
  position: sticky;
  top: 0;
  background: var(--bg);
  padding-bottom: 4px;
  z-index: 1;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 2px;
}
.goal-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.goal-stripe {
  width: 2px; height: 22px;
  border-radius: 1px;
  flex-shrink: 0;
  background: var(--goal-c, var(--dim));
}
.goal-body {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.goal-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.goal-rem {
  flex-shrink: 0;
  font-size: 13px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
  white-space: nowrap;
}
.goal-rem.done-c { color: var(--danger); }
.goal-del {
  flex-shrink: 0;
  background: none;
  border: none;
  color: var(--dim);
  font-size: 13px;
  cursor: pointer;
  padding: 2px 0 2px 6px;
  line-height: 1;
  -webkit-appearance: none;
  transition: color 0.15s;
}
.goal-del:active { color: var(--danger); }

/* ═══════════════════════════ Controls ════════════════════════ */
.controls {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 9px;
  padding: 10px 0 4px;
}
.presets { display: flex; gap: 5px; flex-wrap: wrap; }
.preset-btn {
  flex: 1; min-width: 0;
  padding: 8px 4px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--sub);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  white-space: nowrap;
  -webkit-appearance: none;
}
.preset-btn:active { color: var(--accent); border-color: var(--accent); background: rgba(206,242,49,0.06); }
.input-row { display: flex; gap: 6px; align-items: center; }
.input-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.input-group label {
  font-size: 9px; letter-spacing: 0.2em;
  color: var(--dim); text-align: center; text-transform: uppercase;
}
.input-group input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--bord2);
  border-radius: 9px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 22px; font-weight: 700;
  text-align: center;
  padding: 11px 4px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none; appearance: none;
}
.input-group input:focus { border-color: var(--accent); }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
.colon {
  font-family: 'Space Mono', monospace;
  font-size: 22px; font-weight: 700;
  color: var(--dim);
  padding-bottom: 16px;
  flex-shrink: 0;
}
.btn-row { display: flex; gap: 7px; }
.btn {
  flex: 1;
  padding: 13px 8px;
  border-radius: 10px;
  border: 1px solid var(--bord2);
  background: var(--surface);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  -webkit-appearance: none;
  letter-spacing: -0.3px;
}
.btn:active { transform: scale(0.96); background: var(--surf2); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #0a0a0a; font-weight: 700; }
.btn.primary:active { background: #b8d92a; border-color: #b8d92a; }
.btn:disabled {
  opacity: 1;                      /* keep text legible */
  color: var(--dim);
  background: var(--surface);
  border-color: var(--border);
  pointer-events: none;
}

/* ═══════════════════════════ Modals ══════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(3px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--bord2);
  border-top: 1px solid #333;
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 480px;
  padding: 22px 22px 36px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-height: 92dvh;
  overflow-y: auto;
}
.modal-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 2px; }
.modal-title { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sub); }
.modal-close {
  background: none; border: none;
  color: var(--dim);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 4px;
  line-height: 1;
  transition: color 0.15s;
  -webkit-appearance: none;
}
.modal-close:active { color: var(--text); }

/* Calendar */
.cal-nav { display: flex; align-items: center; justify-content: space-between; }
.cal-month-label { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text); }
.cal-arrow {
  background: none;
  border: 1px solid var(--bord2);
  border-radius: 7px;
  color: var(--text);
  font-size: 15px;
  width: 32px; height: 32px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-appearance: none;
  transition: background 0.12s;
}
.cal-arrow:active { background: var(--surf2); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow { font-size: 10px; color: var(--dim); text-align: center; padding: 4px 0; }
.cal-day {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  border-radius: 7px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  color: var(--text);
  background: none;
  transition: background 0.1s;
  -webkit-appearance: none;
}
.cal-day.today     { border-color: var(--dim); }
.cal-day.sel-start { background: #3a7fff; color: #fff; font-weight: 700; border-color: #3a7fff; }
.cal-day.sel-end   { background: var(--accent); color: #0a0a0a; font-weight: 700; border-color: var(--accent); }
.cal-day.in-range  { background: rgba(206,242,49,0.1); }
.cal-day:not(:empty):hover { background: var(--surf2); }
.cal-legend { font-size: 10px; color: var(--dim); text-align: center; margin-top: -6px; }

.time-section { display: flex; flex-direction: column; gap: 8px; }
.time-section-label {
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
  display: flex; align-items: center; gap: 7px;
}
.dot-s { width: 7px; height: 7px; border-radius: 50%; background: #3a7fff; display: inline-block; flex-shrink: 0; }
.dot-e { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; flex-shrink: 0; }
.time-row { display: flex; gap: 6px; align-items: center; }
.time-row .input-group input { font-size: 17px; padding: 9px 4px; }
.time-row .colon { font-size: 16px; padding-bottom: 14px; }

.modal-confirm {
  width: 100%;
  padding: 14px;
  border-radius: 11px;
  background: var(--accent);
  border: none;
  color: #0a0a0a;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
  letter-spacing: -0.3px;
}
.modal-confirm:active { opacity: 0.8; }

/* Goal modal */
.modal-field { display: flex; flex-direction: column; gap: 8px; }
.modal-field-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
.goal-dur-row { display: flex; gap: 6px; align-items: center; }
.goal-dur-row .input-group input { font-size: 17px; padding: 9px 4px; }
.goal-dur-row .colon { font-size: 16px; padding-bottom: 14px; }
.goal-memo-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--bord2);
  border-radius: 9px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.goal-memo-input:focus { border-color: var(--accent); }
.goal-memo-input::placeholder { color: var(--dim); }
.color-swatches { display: flex; gap: 10px; flex-wrap: wrap; }
.color-swatch {
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  outline: 2.5px solid transparent;
  outline-offset: 2px;
  transition: transform 0.15s, outline-color 0.15s;
  -webkit-appearance: none;
  flex-shrink: 0;
}
.color-swatch.selected { outline-color: var(--text); transform: scale(1.2); }
.color-swatch:active   { transform: scale(0.88); }

/* ═══════════════════════ Dashboard modal ════════════════════ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.stat-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.stat-card .stat-label {
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim);
}
.stat-card .stat-value {
  font-family: 'Space Mono', monospace;
  font-size: 22px; font-weight: 700;
  color: var(--text);
  margin-top: 4px;
  letter-spacing: -1px;
}
.stat-card .stat-value small { font-size: 12px; color: var(--sub); font-weight: 400; }

.chart-block { display: flex; flex-direction: column; gap: 8px; }
.chart-title {
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
  display: flex; align-items: center; justify-content: space-between;
}
.chart-title .legend-avg { color: var(--sub); display: flex; align-items: center; gap: 5px; }
.legend-dash { width: 14px; height: 0; border-top: 1px dashed var(--accent); display: inline-block; }
.chart-svg { width: 100%; height: auto; display: block; }

.proj-card {
  background: linear-gradient(135deg, rgba(206,242,49,0.08), rgba(206,242,49,0.02));
  border: 1px solid rgba(206,242,49,0.25);
  border-radius: 10px;
  padding: 14px;
}
.proj-card .pc-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); }
.proj-card .pc-main {
  font-size: 14px; color: var(--text); margin-top: 6px; line-height: 1.5;
}
.proj-card .pc-main b { color: var(--accent); font-weight: 700; font-family: 'Space Mono', monospace; }

.reset-hour-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.reset-hour-row .rh-label { font-size: 13px; color: var(--text); }
.reset-hour-row .rh-sub { font-size: 10px; color: var(--dim); margin-top: 2px; }
.reset-hour-select {
  background: var(--bg);
  border: 1px solid var(--bord2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 15px; font-weight: 700;
  padding: 8px 10px;
  outline: none;
  -webkit-appearance: none;
  cursor: pointer;
}
.reset-hour-select:focus { border-color: var(--accent); }

.dash-empty {
  text-align: center;
  color: var(--dim);
  font-size: 12px;
  padding: 24px 0;
}

/* ═══════════════════════════ Toast ══════════════════════════ */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(env(safe-area-inset-bottom,16px) + 20px);
  transform: translateX(-50%) translateY(20px);
  background: var(--surf2);
  border: 1px solid var(--bord2);
  border-left: 3px solid var(--accent);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text);
  max-width: 90vw;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Account / sync */
.acct-btn {
  background: var(--surf2);
  border: 1px solid var(--bord2);
  border-radius: 8px;
  color: var(--sub);
  font-size: 14px;
  width: 30px; height: 26px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-appearance: none;
  transition: color 0.15s, border-color 0.15s;
}
.acct-btn.on { color: var(--accent); border-color: var(--accent); }

/* Larger, roomier account sheet */
#acctModal .modal { padding: 28px 24px 40px; gap: 22px; min-height: 38dvh; }
#acctBody { display: flex; flex-direction: column; gap: 22px; }
#acctBody .modal-confirm { padding: 16px; font-size: 16px; }
.acct-row { display: flex; flex-direction: column; gap: 8px; }
.acct-email { font-size: 15px; font-weight: 500; color: var(--text); word-break: break-all; }
.acct-meta { font-size: 12px; color: var(--sub); }
.acct-note { font-size: 14px; color: var(--sub); line-height: 1.75; }
.acct-note code {
  font-family: 'Space Mono', monospace; font-size: 12px;
  background: var(--surf2); padding: 2px 6px; border-radius: 4px; color: var(--text);
}
.acct-secondary {
  width: 100%; padding: 14px; border-radius: 11px;
  background: var(--surf2); border: 1px solid var(--bord2);
  color: var(--text); font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; font-weight: 500; cursor: pointer;
  transition: background 0.15s; -webkit-appearance: none;
}
.acct-secondary:active { background: var(--border); }

/* ═══════════════════════ Notes / memo ════════════════════════ */
.memo-widget { width: 100%; flex-shrink: 0; }
.memo-widget.collapsed { display: flex; justify-content: flex-end; margin-bottom: -2px; }
.memo-fab {
  position: relative;
  width: 42px; height: 42px; border-radius: 10px;
  border: 1px solid var(--bord2); background: var(--surf2);
  color: var(--text); font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-appearance: none; transition: background 0.15s;
}
.memo-fab:active { background: var(--border); }
.memo-dot {
  position: absolute; top: -3px; right: -3px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--danger); border: 2px solid var(--bg);
}
.memo-card {
  width: 100%;
  background: var(--surface); border: 1px solid var(--bord2);
  border-radius: 12px; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
  transform-origin: top center;
  animation: memoIn 0.22s cubic-bezier(0.2, 0.7, 0.2, 1);
}
.memo-card.memo-out { animation: memoOut 0.18s ease forwards; }
@keyframes memoIn  { from { opacity: 0; transform: translateY(-10px) scaleY(0.9); }
                     to   { opacity: 1; transform: none; } }
@keyframes memoOut { from { opacity: 1; transform: none; }
                     to   { opacity: 0; transform: translateY(-10px) scaleY(0.9); } }
.memo-fab { animation: memoFabIn 0.18s ease; }
@keyframes memoFabIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: none; } }
.memo-card-head { display: flex; align-items: center; gap: 8px; }
.memo-card-title {
  flex: 1; font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.memo-card-actions { display: flex; gap: 2px; flex-shrink: 0; }
.memo-mini-btn { background: none; border: none; color: var(--dim); font-size: 15px;
  cursor: pointer; padding: 2px 5px; line-height: 1; -webkit-appearance: none; }
.memo-mini-btn:active { color: var(--text); }
.memo-text { font-size: 13px; color: var(--sub); line-height: 1.55; white-space: pre-wrap;
  max-height: 26vh; overflow-y: auto; word-break: break-word; }
.memo-checks { display: flex; flex-direction: column; gap: 7px; max-height: 30vh; overflow-y: auto; }
.memo-check { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--text); cursor: pointer; }
.memo-check input { width: 17px; height: 17px; accent-color: var(--accent); flex-shrink: 0; }
.memo-check span { min-width: 0; word-break: break-word; }
.memo-check.done span { color: var(--dim); text-decoration: line-through; }
.memo-empty { font-size: 12px; color: var(--dim); }

.notes-actions { display: flex; gap: 8px; }
.notes-actions .acct-secondary { flex: 1; }
#notesList { display: flex; flex-direction: column; gap: 8px; max-height: 58vh; overflow-y: auto; }
.note-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; }
.note-row:active { background: var(--border); }
.note-row-body { flex: 1; min-width: 0; }
.note-row-title { font-size: 14px; color: var(--text); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
.note-row-sub { font-size: 11px; color: var(--dim); margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-row-del { background: none; border: none; color: var(--dim); font-size: 14px;
  cursor: pointer; padding: 4px 2px; flex-shrink: 0; -webkit-appearance: none; }
.note-row-del:active { color: var(--danger); }
.notes-empty { font-size: 13px; color: var(--dim); text-align: center; padding: 22px 0; }

.note-pin-row { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--sub); cursor: pointer; }
.note-pin-row input { width: 17px; height: 17px; accent-color: var(--accent); }
.note-delete { color: var(--danger); }
#noteEditBody textarea {
  width: 100%; min-height: 140px; resize: vertical;
  background: var(--surface); border: 1px solid var(--bord2); border-radius: 10px;
  color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px;
  padding: 12px; outline: none; line-height: 1.6; -webkit-appearance: none;
}
#noteEditBody textarea:focus { border-color: var(--accent); }
.note-items { display: flex; flex-direction: column; gap: 8px; max-height: 40vh; overflow-y: auto; }
.note-item-edit { display: flex; align-items: center; gap: 8px; }
.note-item-edit input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
.note-item-edit input[type=text] {
  flex: 1; min-width: 0; background: var(--surface); border: 1px solid var(--bord2); border-radius: 8px;
  color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; padding: 9px 10px;
  outline: none; -webkit-appearance: none;
}
.note-item-edit input[type=text]:focus { border-color: var(--accent); }
.note-item-del { background: none; border: none; color: var(--dim); font-size: 16px;
  cursor: pointer; padding: 2px 6px; flex-shrink: 0; -webkit-appearance: none; }
.note-add-item { align-self: flex-start; background: none; border: 1px dashed var(--bord2);
  color: var(--sub); border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; -webkit-appearance: none; }
.note-add-item:active { background: var(--surf2); }

/* Note editor opens from the TOP so the on-screen keyboard can't cover the
   inputs (bottom-sheet editors get hidden behind the keyboard on phones). */
#noteEditModal { align-items: flex-start; }
#noteEditModal .modal {
  border-radius: 0 0 20px 20px;
  padding-top: max(env(safe-area-inset-top), 16px);
  max-height: 100dvh;
}

/* ═══════════════════════ Responsive layouts ══════════════════════ */

/* ── Tablet portrait & large phones: roomier single column ── */
@media (min-width: 600px) and (orientation: portrait) {
  :root { --maxw: 600px; }
  body { padding-left: max(env(safe-area-inset-left), 28px);
         padding-right: max(env(safe-area-inset-right), 28px); }
  .header-title { font-size: 11px; }
  .status-text  { font-size: 11px; }
  .time-sublabel { font-size: 11px; margin-bottom: 10px; }
  .study-row { padding: 14px 16px; gap: 14px; margin-top: 14px; }
  .sw-toggle, .dash-btn { width: 48px; height: 48px; border-radius: 12px; font-size: 18px; }
  .sw-time { font-size: 28px; }
  .goals-wrap { max-height: 240px; gap: 8px; }
  .goal-item { padding: 12px 15px; }
  .goal-name { font-size: 15px; }
  .preset-btn { font-size: 12.5px; padding: 11px 4px; }
  .input-group input { font-size: 26px; padding: 13px 4px; }
  .colon { font-size: 24px; }
  .btn { padding: 15px 10px; font-size: 15px; }
  .meta-row .elapsed-label { font-size: 13px; }
}

/* ── Two-column structural layout (shared) ──
   Used when the viewport is short & wide (landscape phones / tablets) or
   simply large (laptops / desktops). Left = clock, right = controls. */
@media (orientation: landscape) and (max-height: 620px),
       (min-width: 940px) and (min-height: 560px) {
  .app {
    max-width: min(980px, 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto minmax(0, 1fr);
    column-gap: clamp(24px, 5vw, 64px);
    align-items: stretch;
  }
  .header        { grid-column: 1 / -1; }
  .display-area  { grid-column: 1; grid-row: 2; }
  .side-panel    {
    grid-column: 2; grid-row: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;   /* center the group within the column */
    min-height: 0;
    gap: 10px;
  }
  .study-row, .controls { margin: 0; }
  .controls { padding: 0; }
  .study-row { flex-shrink: 0; }
  .side-panel .goals-wrap { flex: 0 1 auto; min-height: 0; max-height: 32vh; }
  .progress-track { max-width: 100%; }
  /* clock fits within HALF the width, so cap by vw more tightly */
  .time-display { font-size: clamp(38px, min(9vw, 15vh), 88px); }
}

/* ── Compact landscape (phones / small tablets sideways): tighten ── */
@media (orientation: landscape) and (max-height: 620px) {
  body { padding-top: max(env(safe-area-inset-top), 8px);
         padding-bottom: max(env(safe-area-inset-bottom), 8px); }
  .header { padding: 2px 0 8px; }
  .display-area { gap: 2px; }
  .time-display { margin-top: 2px; }
  .time-sublabel { margin: 2px 0 4px; }
  .progress-track { padding-top: 22px; }
  .study-row { padding: 8px 12px; gap: 10px; }
  .sw-toggle, .dash-btn { width: 38px; height: 38px; }
  .sw-time { font-size: 21px; }
  /* cramped height: let goals absorb leftover space & scroll, pin controls */
  .side-panel { justify-content: flex-start; }
  .side-panel .goals-wrap { flex: 1 1 0; max-height: none; padding: 2px 0; }
  .controls { gap: 7px; }
  .input-group input { font-size: 19px; padding: 8px 4px; }
  .colon { font-size: 18px; padding-bottom: 12px; }
  .btn { padding: 11px 6px; font-size: 13.5px; }
  .preset-btn { padding: 8px 3px; font-size: 11px; }
}

/* ── Laptop / desktop / large tablet landscape: roomy two-column ── */
@media (min-width: 940px) and (min-height: 560px) {
  body { padding: 32px max(env(safe-area-inset-left), 40px); }
  .app { column-gap: clamp(48px, 6vw, 88px); }
  .side-panel { justify-content: center; gap: 14px; }
  .header { padding: 4px 0 22px; }
  .header-title, .status-text { font-size: 11px; }
  .study-row { padding: 16px 18px; gap: 15px; }
  .sw-toggle, .dash-btn { width: 50px; height: 50px; border-radius: 12px; font-size: 19px; }
  .sw-time { font-size: 30px; }
  .goals-wrap { max-height: 320px; gap: 8px; }
  .goal-item { padding: 13px 16px; }
  .goal-name { font-size: 15px; }
  .preset-btn { font-size: 13px; padding: 12px 4px; }
  .input-group input { font-size: 27px; padding: 14px 4px; }
  .colon { font-size: 25px; }
  .btn { padding: 16px 10px; font-size: 15px; }
  .meta-row .elapsed-label { font-size: 13px; }
  .end-label { font-size: 12px; }
  /* pointer devices: add hover affordances */
  .preset-btn:hover { color: var(--accent); border-color: var(--bord2); }
  .btn:hover { background: var(--surf2); }
  .goal-del:hover { color: var(--danger); }
  .sw-toggle:hover, .dash-btn:hover, .acct-btn:hover { border-color: var(--dim); }
}

/* ── Pointer (mouse) devices anywhere: subtle hover feedback ── */
@media (hover: hover) and (pointer: fine) {
  .preset-btn:hover { border-color: var(--bord2); color: var(--sub); }
  .corner-btn:hover { background: var(--surf2); }
  .modal-confirm:hover { opacity: 0.92; }
  .cal-arrow:hover { background: var(--surf2); }
}
</style>

</div>

      <span class="modal-title" id="noteEditTitle">메모 편집</span>
      <button class="modal-close" id="noteEditClose">✕</button>
    </div>
    <div class="modal-field">
      <span class="modal-field-label">제목</span>
      <input type="text" class="goal-memo-input" id="noteTitleInput" placeholder="제목" maxlength="60">
    </div>
    <div id="noteEditBody"></div>
    <label class="note-pin-row">
      <input type="checkbox" id="notePinInput"> <span>메인 화면에 고정</span>
    </label>
    <button class="modal-confirm" id="noteSave">저장</button>
    <button class="acct-secondary note-delete" id="noteDelete">삭제</button>
  </div>
</div>

<!-- Dashboard modal -->
<div class="modal-overlay" id="dashModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">공부 대시보드</span>
      <button class="modal-close" id="dashClose">✕</button>
    </div>
    <div id="dashBody"></div>
  </div>
</div>

<!-- Account / sync -->
<div class="modal-overlay" id="acctModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">계정 / 동기화</span>
      <button class="modal-close" id="acctClose">✕</button>
    </div>
    <div id="acctBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const STORE_KEY = 'timer_v4';
const GOALS_KEY = 'timer_goals_v1';
const STUDY_KEY = 'timer_study_v1';
const NOTES_KEY = 'timer_notes_v1';

const GOAL_COLORS = [
  '#f03c3c', '#ff8800', '#cef231',
  '#2edf7a', '#3a8fff', '#a855f7',
  '#f542c8', '#00cfff',
];

/* ── Flag SVG geometry (must stay in sync with CSS .progress-track padding-top) ──
   BAR_Y    = padding-top of .progress-track   = 28
   BAR_H    = .progress-bar height             = 4
   BANNER_H = banner height                    = 14
   POLE_TOP = banner bottom                    = 14
   POLE_BOT = BAR_Y + BAR_H + 2 = 34  (pole tip 2px below bar)
   Marker (goal position) = pole LEFT edge (x=0) so nothing pokes left of it. */
const BAR_Y    = 28;
const BAR_H    = 4;
const BANNER_H = 14;
const POLE_TOP = BANNER_H;
const POLE_BOT = BAR_Y + BAR_H + 2;
const SVG_H    = POLE_BOT;

function makeFlagSVG(color) {
  const tip = Math.round(BANNER_H / 2);
  /* Pole left edge at x=0 (the marker). Banner mounts from the pole rightward
     with a pointed right tip — instantly reads as a flag. */
  return `<svg width="26" height="${SVG_H}" viewBox="0 0 26 ${SVG_H}"
    xmlns="http://www.w3.org/2000/svg" fill="${color}">
    <path d="M0,0 H18 L23,${tip} L18,${BANNER_H} H0 Z"/>
    <rect x="0" y="${POLE_TOP}" width="2.4" height="${POLE_BOT - POLE_TOP}" rx="1.2"/>
  </svg>`;
}

// ── Timer state ────────────────────────────────────────────────
let goalEpoch       = null;
let startEpoch      = null;
let pausedRemaining = null;
let totalSeconds    = 0;
let rafId           = null;
let lastDisplayed   = -1;
let emergency       = false;

// ── Goals state ────────────────────────────────────────────────
let goals         = [];
let selectedColor = GOAL_COLORS[0];
let lastGoalSec   = -1;

// ── Study state ────────────────────────────────────────────────
let study = {
  resetHour: 0,        // local hour at which the study day rolls over
  records:   {},       // 'YYYY-MM-DD' -> seconds
  swRunning: false,
  swLastTick: null,    // epoch ms of last accounting tick
};
let lastSeenStudyDay = null;

// ── Notes / memos state ────────────────────────────────────────
// note: { id, title, type:'text'|'list', text, items:[{t,done}], pinned, updatedAt }
let notes = [];
let editingNoteId = null;

// ── DOM ────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const timeDisplay   = $('timeDisplay');
const elapsedLabel  = $('elapsedLabel');
const endLabel      = $('endLabel');
const metaSep       = $('metaSep');
const metaRow2      = $('metaRow2');
const progressFill  = $('progressFill');
const progressTrack = $('progressTrack');
const statusDot     = $('statusDot');
const statusText    = $('statusText');
const startBtn      = $('startBtn');
const pauseBtn      = $('pauseBtn');
const resetBtn      = $('resetBtn');
const hInput        = $('hInput');
const mInput        = $('mInput');
const sInput        = $('sInput');
const emgBtn        = $('emgBtn');
const goalsWrap     = $('goalsWrap');
const swToggle      = $('swToggle');
const swTimeEl      = $('swTime');

// ── Formatters ─────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');

function fmt(secs) {
  secs = Math.max(0, Math.floor(secs));
  const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}
function fmtDate(ms) {
  const d = new Date(ms);
  return `종료 ${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtElapsed(secs) {
  if (secs <= 0) return '—';
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
  const p = [];
  if (h) p.push(`${h}시간`);
  if (m) p.push(`${m}분`);
  if (s || !p.length) p.push(`${s}초`);
  return '경과 ' + p.join(' ');
}
function fmtGoalRem(endEpoch) {
  const rem = Math.max(0, Math.floor((endEpoch - Date.now()) / 1000));
  if (rem === 0) return '완료';
  const h = Math.floor(rem / 3600), m = Math.floor((rem % 3600) / 60), s = rem % 60;
  if (h >= 1) return `${h}h ${pad(m)}m`;
  if (m >= 1) return `${m}m ${pad(s)}s`;
  return `${s}s`;
}
function fmtHrs(sec) {
  const h = sec / 3600;
  if (h >= 10) return Math.round(h) + 'h';
  return (Math.round(h * 10) / 10) + 'h';
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Timer helpers ──────────────────────────────────────────────
function getRem() {
  if (goalEpoch !== null) return Math.max(0, Math.floor((goalEpoch - Date.now()) / 1000));
  if (pausedRemaining !== null) return pausedRemaining;
  return 0;
}
function isRunning() { return goalEpoch !== null; }
function isPaused()  { return goalEpoch === null && pausedRemaining !== null; }
function isIdle()    { return goalEpoch === null && pausedRemaining === null; }

// D-day count: whole days from today (local midnight) to goal date.
function dDayNum() {
  if (!goalEpoch) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const gd    = new Date(goalEpoch); gd.setHours(0,0,0,0);
  return Math.round((gd - today) / 86400000);
}

// ── Persistence ────────────────────────────────────────────────
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify({ goalEpoch, startEpoch, pausedRemaining, totalSeconds, emergency })); } catch(e) {}
  syncTouch();
}
function clearSave() { try { localStorage.removeItem(STORE_KEY); } catch(e) {} syncTouch(); }
function saveGoals() { try { localStorage.setItem(GOALS_KEY, JSON.stringify(goals)); } catch(e) {} syncTouch(); }
function loadGoals() { try { goals = JSON.parse(localStorage.getItem(GOALS_KEY)) || []; } catch(e) { goals = []; } }
function saveStudy() { try { localStorage.setItem(STUDY_KEY, JSON.stringify(study)); } catch(e) {} syncTouch(); }
function saveNotes() { try { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); } catch(e) {} syncTouch(); }
function loadNotes() { try { notes = JSON.parse(localStorage.getItem(NOTES_KEY)) || []; } catch(e) { notes = []; } if (!Array.isArray(notes)) notes = []; }
function loadStudy() {
  try {
    const s = JSON.parse(localStorage.getItem(STUDY_KEY));
    if (s) study = Object.assign(study, s);
  } catch(e) {}
  if (!study.records) study.records = {};
}

// ── Study day keying (respects configurable resetHour) ─────────
function studyDayKey(ms) {
  const d = new Date(ms - study.resetHour * 3600 * 1000);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
// Key for the study day that is `n` days before the current one.
function studyDayKeyOffset(n) {
  const base = new Date(Date.now() - study.resetHour * 3600 * 1000);
  base.setDate(base.getDate() - n);
  return `${base.getFullYear()}-${pad(base.getMonth()+1)}-${pad(base.getDate())}`;
}
function todayStudySec() { return Math.floor(study.records[studyDayKey(Date.now())] || 0); }

// ── Stopwatch accounting (incremental, attributes to correct day) ─
function accountStopwatch() {
  if (!study.swRunning) return;
  const now = Date.now();
  if (study.swLastTick == null) { study.swLastTick = now; return; }
  const dt = (now - study.swLastTick) / 1000;
  study.swLastTick = now;
  if (dt <= 0) return;
  const key = studyDayKey(now);
  study.records[key] = (study.records[key] || 0) + dt;
  saveStudy();
}

function toggleStopwatch() {
  if (study.swRunning) {
    accountStopwatch();
    study.swRunning = false;
    study.swLastTick = null;
  } else {
    requestNotifyPermission();
    study.swRunning = true;
    study.swLastTick = Date.now();
  }
  saveStudy();
  updateStudyUI();
}

// ── Flag + tick rendering ──────────────────────────────────────
function refRange() {
  const refStart = startEpoch;
  const refEnd   = goalEpoch
    ?? (startEpoch && totalSeconds > 0 ? startEpoch + totalSeconds * 1000 : null);
  if (!refStart || !refEnd || refEnd <= refStart) return null;
  return { refStart, refEnd, span: refEnd - refStart };
}

function renderGoalFlags() {
  progressTrack.querySelectorAll('.goal-flag').forEach(f => f.remove());
  const r = refRange();
  if (!r) return;
  goals.forEach(g => {
    const pct = ((g.endEpoch - r.refStart) / r.span) * 100;
    if (pct < 0 || pct > 100) return;
    const wrap = document.createElement('div');
    wrap.className = 'goal-flag';
    wrap.style.left = pct.toFixed(3) + '%';
    wrap.title = g.memo || '목표';
    wrap.innerHTML = makeFlagSVG(g.color);
    progressTrack.appendChild(wrap);
  });
}

// Day boundary ticks at each local midnight in the span.
function renderDayTicks() {
  progressTrack.querySelectorAll('.day-tick').forEach(t => t.remove());
  const r = refRange();
  if (!r) return;

  // Collect local midnights strictly inside (refStart, refEnd)
  const marks = [];
  const d = new Date(r.refStart);
  d.setHours(24, 0, 0, 0); // first midnight after start
  while (d.getTime() < r.refEnd) {
    marks.push(d.getTime());
    d.setDate(d.getDate() + 1);
  }
  // Avoid clutter: if too many days, only show weekly ticks
  const step = marks.length > 60 ? 7 : 1;
  marks.forEach((ms, i) => {
    if (i % step !== 0) return;
    const pct = ((ms - r.refStart) / r.span) * 100;
    const tick = document.createElement('div');
    tick.className = 'day-tick';
    tick.style.left = pct.toFixed(3) + '%';
    progressTrack.appendChild(tick);
  });
}

// ── Goals list ─────────────────────────────────────────────────
function renderGoals() {
  if (goals.length === 0) { goalsWrap.innerHTML = ''; return; }
  goalsWrap.innerHTML =
    `<div class="goals-section-label">목표</div>` +
    goals.map(g => {
      const rem      = Math.max(0, Math.floor((g.endEpoch - Date.now()) / 1000));
      const remText  = fmtGoalRem(g.endEpoch);
      const remClass = rem === 0 ? 'goal-rem done-c' : 'goal-rem';
      return `<div class="goal-item" data-gid="${g.id}">
        <div class="goal-stripe" style="--goal-c:${g.color}"></div>
        <div class="goal-body">
          <span class="goal-name">${escHtml(g.memo || '목표')}</span>
          <span class="${remClass}" data-rem="${g.id}">${remText}</span>
        </div>
        <button class="goal-del" data-del="${g.id}">✕</button>
      </div>`;
    }).join('');
  goalsWrap.querySelectorAll('.goal-del').forEach(btn => {
    btn.addEventListener('click', () => {
      goals = goals.filter(g => g.id !== parseInt(btn.dataset.del));
      saveGoals(); renderGoals(); renderGoalFlags();
    });
  });
}
function updateGoalTimes() {
  goals.forEach(g => {
    const el = goalsWrap.querySelector(`[data-rem="${g.id}"]`);
    if (!el) return;
    const rem = Math.max(0, Math.floor((g.endEpoch - Date.now()) / 1000));
    el.textContent = fmtGoalRem(g.endEpoch);
    el.className   = rem === 0 ? 'goal-rem done-c' : 'goal-rem';
  });
}

// ── Study stats ────────────────────────────────────────────────
function studyStats() {
  const entries = Object.entries(study.records).filter(([,v]) => v > 0.5);
  const total   = entries.reduce((a,[,v]) => a + v, 0);
  const days    = entries.length;
  const avg     = days ? total / days : 0;
  const best    = entries.reduce((m,[,v]) => Math.max(m, v), 0);
  // streak: consecutive study days ending today or yesterday
  let streak = 0;
  const todayHas = (study.records[studyDayKeyOffset(0)] || 0) > 0.5;
  let i = todayHas ? 0 : 1;
  while ((study.records[studyDayKeyOffset(i)] || 0) > 0.5) { streak++; i++; }
  return { total, days, avg, best, streak };
}

// ── Projection line on main screen ─────────────────────────────
function updateProjection() {
  metaRow2.innerHTML = '';
  const dd = dDayNum();
  if (dd === null) return;

  // D-day chip
  let ddText, ddClass = 'dday-chip';
  if (dd > 0)       ddText = `D-${dd}`;
  else if (dd === 0) ddText = 'D-DAY';
  else { ddText = `D+${-dd}`; ddClass += ' past'; }
  metaRow2.insertAdjacentHTML('beforeend', `<span class="${ddClass}">${ddText}</span>`);

  // Projection: if we have study data and days remain
  const st = studyStats();
  if (st.days > 0 && dd > 0) {
    const projSec = st.avg * dd;
    metaRow2.insertAdjacentHTML('beforeend',
      `<span class="proj-text">평균 <b>${fmtHrs(st.avg)}/일</b> · 이대로면 <b>+${fmtHrs(projSec)}</b> 더 공부</span>`);
  }
}

// ── Study UI ───────────────────────────────────────────────────
function updateStudyUI() {
  accountStopwatch();
  const sec = todayStudySec();
  swTimeEl.textContent = fmt(sec);
  swTimeEl.classList.toggle('running', study.swRunning);
  swToggle.textContent = study.swRunning ? '⏸' : '▶';
  swToggle.classList.toggle('running', study.swRunning);
  updateProjection();
}

// ── Day rollover detection + notification ──────────────────────
function checkDayRollover() {
  const cur = studyDayKey(Date.now());
  if (lastSeenStudyDay === null) { lastSeenStudyDay = cur; return; }
  if (cur !== lastSeenStudyDay) {
    notifyDayEnd(lastSeenStudyDay);
    lastSeenStudyDay = cur;
  }
}
function notifyDayEnd(dayKey) {
  const sec = study.records[dayKey] || 0;
  const others = Object.entries(study.records)
    .filter(([k,v]) => k !== dayKey && v > 0.5).map(([,v]) => v);
  const avg = others.length ? others.reduce((a,b)=>a+b,0) / others.length : 0;
  const diff = sec - avg;
  const sign = diff >= 0 ? '+' : '−';
  const body = `오늘 ${fmtHrs(sec)} · 평균 ${fmtHrs(avg)} (${sign}${fmtHrs(Math.abs(diff))})`;
  notify('하루 공부 기록', body);
}

// ── Notifications ──────────────────────────────────────────────
function requestNotifyPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    try { Notification.requestPermission(); } catch(e) {}
  }
}
function notify(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    try { new Notification(title, { body }); showToast(`${title} · ${body}`); return; }
    catch(e) {}
  }
  showToast(`${title} · ${body}`);
}
let toastTimer = null;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 6000);
}

// ── Core render ────────────────────────────────────────────────
function render() {
  const rem  = getRem();
  const done = rem === 0 && totalSeconds > 0;

  if (rem !== lastDisplayed) { lastDisplayed = rem; timeDisplay.textContent = fmt(rem); }

  timeDisplay.classList.toggle('done',      done && !emergency);
  timeDisplay.classList.toggle('emergency', emergency && !done);

  let pct = 0;
  if (startEpoch && goalEpoch) {
    const span = goalEpoch - startEpoch, elapsed = Date.now() - startEpoch;
    pct = Math.min(100, Math.max(0, elapsed / span * 100));
    elapsedLabel.textContent = fmtElapsed(Math.floor(elapsed / 1000));
  } else if (totalSeconds > 0) {
    const elapsed = totalSeconds - rem;
    pct = Math.min(100, elapsed / totalSeconds * 100);
    elapsedLabel.textContent = fmtElapsed(elapsed);
  } else {
    elapsedLabel.textContent = '—';
  }
  progressFill.style.width = pct.toFixed(3) + '%';
  progressFill.classList.toggle('running',   isRunning() && !emergency);
  progressFill.classList.toggle('emergency', emergency);

  const hasEnd = !!goalEpoch;
  endLabel.textContent  = hasEnd ? fmtDate(goalEpoch) : '';
  metaSep.style.display = hasEnd ? '' : 'none';

  if (done)            { statusDot.className = 'dot done';   statusText.textContent = '완료'; }
  else if (isRunning()){ statusDot.className = 'dot active'; statusText.textContent = '진행중'; }
  else if (isPaused()) { statusDot.className = 'dot';        statusText.textContent = '일시정지'; }
  else                 { statusDot.className = 'dot';        statusText.textContent = ''; }

  startBtn.disabled    = isRunning() || done;
  startBtn.textContent = isRunning() ? '실행중' : isPaused() ? '계속' : '시작';
  pauseBtn.disabled    = isIdle() || done;
  pauseBtn.textContent = isPaused() ? '계속' : '일시정지';

  const locked = isRunning();
  [hInput, mInput, sInput].forEach(inp => { inp.disabled = locked; inp.style.opacity = locked ? '0.5' : '1'; });
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.disabled = locked; b.style.opacity = locked ? '0.5' : '1'; b.style.pointerEvents = locked ? 'none' : '';
  });

  emgBtn.classList.toggle('on', emergency);

  renderGoalFlags();

  const nowSec = Math.floor(Date.now() / 1000);
  if (nowSec !== lastGoalSec) {
    lastGoalSec = nowSec;
    updateGoalTimes();
    updateProjection();
  }
}

// ── Main timer animation loop ──────────────────────────────────
function startTick() {
  if (rafId) cancelAnimationFrame(rafId);
  function loop() {
    render();
    if (getRem() === 0 && goalEpoch !== null) {
      goalEpoch = null;
      if ('vibrate' in navigator) navigator.vibrate([400,200,400,200,400]);
      render(); save(); rafId = null; return;
    }
    save(); rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

// ── 1-second housekeeping (always running) ─────────────────────
setInterval(() => {
  accountStopwatch();
  checkDayRollover();
  updateStudyUI();
  if (goals.length && !rafId) { updateGoalTimes(); }
}, 1000);

// Re-account when returning to foreground (don't count background time
// beyond the wall clock; accounting uses real dt so this just commits).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') { accountStopwatch(); updateStudyUI(); }
});

// ── Timer actions ──────────────────────────────────────────────
function doStart() {
  const rem = getRem();
  if (rem <= 0) return;
  if (!startEpoch) startEpoch = Date.now();
  goalEpoch = Date.now() + rem * 1000;
  pausedRemaining = null; lastDisplayed = -1;
  startTick(); render(); save();
  renderDayTicks();
}
function doPause() {
  if (!isRunning()) return;
  pausedRemaining = getRem(); goalEpoch = null;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  render(); save();
}
function doReset() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  goalEpoch = null; startEpoch = null; pausedRemaining = null;
  totalSeconds = 0; lastDisplayed = -1;
  render(); clearSave();
  renderDayTicks();
}
function setDuration(secs) {
  doReset(); totalSeconds = secs; pausedRemaining = secs; render(); save();
}

// ── Button events ──────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  if (isPaused()) { doStart(); return; }
  if (isIdle()) {
    const h = parseInt(hInput.value)||0, m = parseInt(mInput.value)||0, s = parseInt(sInput.value)||0;
    const t = h*3600+m*60+s; if (!t) return;
    totalSeconds = t; pausedRemaining = t;
  }
  doStart();
});
pauseBtn.addEventListener('click', () => { if (isRunning()) doPause(); else if (isPaused()) doStart(); });
resetBtn.addEventListener('click', doReset);

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (isRunning() || !btn.dataset.h) return;
    hInput.value = btn.dataset.h; mInput.value = 0; sInput.value = 0;
    setDuration(parseInt(btn.dataset.h) * 3600);
  });
});
[hInput, mInput, sInput].forEach(inp => {
  inp.addEventListener('change', () => {
    if (isRunning()) return;
    const h = parseInt(hInput.value)||0, m = parseInt(mInput.value)||0, s = parseInt(sInput.value)||0;
    const t = h*3600+m*60+s; if (t) setDuration(t);
  });
});
emgBtn.addEventListener('click', () => { emergency = !emergency; render(); save(); });
swToggle.addEventListener('click', toggleStopwatch);

// ── Fullscreen ─────────────────────────────────────────────────
const fsBtn = $('fsBtn');
fsBtn.addEventListener('click', () => {
  const el = document.documentElement, isFs = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFs) { const req = el.requestFullscreen || el.webkitRequestFullscreen; if (req) req.call(el); }
  else       { const ex  = document.exitFullscreen || document.webkitExitFullscreen; if (ex) ex.call(document); }
});
['fullscreenchange','webkitfullscreenchange'].forEach(ev => {
  document.addEventListener(ev, () => {
    fsBtn.textContent = (document.fullscreenElement || document.webkitFullscreenElement) ? '✕' : '⛶';
  });
});

// ── Wake lock ──────────────────────────────────────────────────
async function reqWakeLock() {
  if ('wakeLock' in navigator) try { await navigator.wakeLock.request('screen'); } catch(e) {}
}
reqWakeLock();
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') reqWakeLock(); });

// ── Calendar modal ─────────────────────────────────────────────
const calModal = $('calModal'), calMonthLbl = $('calMonthLabel'), calGridEl = $('calGrid');
let calYear, calMonth, selStart = null, selEnd = null, picking = 'start';
const DAYS   = ['일','월','화','수','목','금','토'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function openCal() {
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth(); selStart = null; selEnd = null; picking = 'start';
  $('sH').value = now.getHours(); $('sM').value = now.getMinutes(); $('sS').value = now.getSeconds();
  $('eH').value = ''; $('eM').value = ''; $('eS').value = '';
  renderCal(); calModal.classList.add('open');
}
function dateKey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function sameDay(a,b) { return a && b && dateKey(a) === dateKey(b); }
function between(d,a,b) {
  if (!a || !b) return false;
  const t = d.getTime(), ta = a.getTime(), tb = b.getTime();
  return t > Math.min(ta,tb) && t < Math.max(ta,tb);
}
function renderCal() {
  calMonthLbl.textContent = `${calYear}년 ${MONTHS[calMonth]}`;
  calGridEl.innerHTML = '';
  DAYS.forEach(d => { const el = document.createElement('div'); el.className='cal-dow'; el.textContent=d; calGridEl.appendChild(el); });
  const first = new Date(calYear, calMonth, 1).getDay();
  const days  = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i=0; i<first; i++) calGridEl.appendChild(document.createElement('div'));
  for (let d=1; d<=days; d++) {
    const btn = document.createElement('button'), day = new Date(calYear, calMonth, d);
    btn.className = 'cal-day'; btn.textContent = d;
    if (day.toDateString()===today.toDateString()) btn.classList.add('today');
    if (sameDay(day,selStart)) btn.classList.add('sel-start');
    else if (sameDay(day,selEnd)) btn.classList.add('sel-end');
    else if (selStart && selEnd && between(day,selStart,selEnd)) btn.classList.add('in-range');
    btn.addEventListener('click', () => {
      const clicked = new Date(calYear, calMonth, d);
      if (picking==='start') {
        selStart = clicked;
        if (sameDay(clicked,today)) { const n=new Date(); $('sH').value=n.getHours(); $('sM').value=n.getMinutes(); $('sS').value=n.getSeconds(); }
        picking = 'end';
      } else {
        if (clicked < selStart) { selEnd=selStart; selStart=clicked; } else selEnd=clicked;
        picking = 'start';
      }
      renderCal();
    });
    calGridEl.appendChild(btn);
  }
}
$('calPrev').addEventListener('click', () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); });
$('calNext').addEventListener('click', () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); });
$('calClose').addEventListener('click', () => calModal.classList.remove('open'));

$('calConfirm').addEventListener('click', () => {
  if (!selStart||!selEnd) { alert('시작일과 종료일을 모두 선택해주세요.'); return; }
  const sh=parseInt($('sH').value)||0, sm=parseInt($('sM').value)||0, ss=parseInt($('sS').value)||0;
  const eh=parseInt($('eH').value)||0, em=parseInt($('eM').value)||0, es=parseInt($('eS').value)||0;

});

const dashModal = $('dashModal');

function renderDashboard() {
  const body = $('dashBody');
  const st   = studyStats();
  const today = todayStudySec();

  // Reset-hour selector options
  const hourOpts = Array.from({length:24}, (_,h) =>
    `<option value="${h}" ${h===study.resetHour?'selected':''}>${pad(h)}:00</option>`).join('');

  if (st.days === 0 && today < 1) {
    body.innerHTML = `
      <div class="dash-empty">아직 기록이 없어요.<br>공부 스톱워치를 시작해 보세요 ▶</div>
      ${resetHourBlock(hourOpts)}`;
    bindResetHour();
    return;
  }

  // Last 14 days bar chart data
  const N = 14;
  const data = [];
  for (let i = N-1; i >= 0; i--) {
    const key = studyDayKeyOffset(i);
    const sec = study.records[key] || 0;
    const parts = key.split('-');
    data.push({ key, sec, label: `${parseInt(parts[1])}/${parseInt(parts[2])}` });
  }
  const maxSec = Math.max(...data.map(d => d.sec), 1);

  // Build SVG bar chart
  const W = 440, H = 150, padL = 4, padR = 4, padT = 12, padB = 20;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const bw = plotW / N;
  const avgY = padT + plotH - (st.avg / maxSec) * plotH;

  const bars = data.map((d,i) => {
    const bh = (d.sec / maxSec) * plotH;
    const x  = padL + i*bw + bw*0.18;
    const y  = padT + plotH - bh;
    const w  = bw*0.64;
    const isToday = i === N-1;
    const fill = isToday ? 'var(--accent)' : (d.sec>0 ? '#4a5a18' : '#1c1c1c');
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${Math.max(0,bh).toFixed(1)}" rx="2" fill="${fill}"></rect>`;
  }).join('');

  // x labels: show every other to avoid crowding
  const labels = data.map((d,i) => {
    if (i % 2 !== (N-1)%2) return '';
    const x = padL + i*bw + bw/2;
    return `<text x="${x.toFixed(1)}" y="${H-6}" fill="var(--dim)" font-size="9" text-anchor="middle" font-family="Space Mono">${d.label}</text>`;
  }).join('');

  const avgLine = st.avg > 0
    ? `<line x1="${padL}" y1="${avgY.toFixed(1)}" x2="${W-padR}" y2="${avgY.toFixed(1)}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 3" opacity="0.8"></line>`
    : '';

  // Projection block
  const dd = dDayNum();
  let projHTML = '';
  if (dd !== null && dd > 0 && st.avg > 0) {
    const projSec = st.avg * dd;
    projHTML = `
      <div class="proj-card">
        <div class="pc-label">목표까지 예상</div>
        <div class="pc-main">남은 <b>D-${dd}</b> 동안 하루 평균 <b>${fmtHrs(st.avg)}</b> 페이스면<br>
        앞으로 <b>+${fmtHrs(projSec)}</b> 더 공부할 수 있어요.</div>
      </div>`;
  } else if (dd !== null && dd > 0) {
    projHTML = `
      <div class="proj-card">
        <div class="pc-label">목표까지</div>
        <div class="pc-main">남은 <b>D-${dd}</b> · 공부 기록이 쌓이면 예상치를 보여드려요.</div>
      </div>`;
  }

  body.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">오늘</div><div class="stat-value">${fmtHrs(today)}<small> ${fmt(today).slice(0,5)}</small></div></div>
      <div class="stat-card"><div class="stat-label">일 평균</div><div class="stat-value">${fmtHrs(st.avg)}</div></div>
      <div class="stat-card"><div class="stat-label">총 공부</div><div class="stat-value">${fmtHrs(st.total)}</div></div>
      <div class="stat-card"><div class="stat-label">연속 일수</div><div class="stat-value">${st.streak}<small> 일</small></div></div>
    </div>

    ${projHTML}

    <div class="chart-block">
      <div class="chart-title">
        <span>최근 14일</span>
        <span class="legend-avg"><span class="legend-dash"></span>평균 ${fmtHrs(st.avg)}</span>
      </div>
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        ${avgLine}${bars}${labels}
      </svg>
    </div>

    <div class="chart-block">
      <div class="chart-title"><span>최고 기록</span></div>
      <div class="stat-card"><div class="stat-value">${fmtHrs(st.best)}<small> 하루 최대</small></div></div>
    </div>

    ${resetHourBlock(hourOpts)}
  `;
  bindResetHour();
}

const META_KEY     = 'timer_sync_meta_v1';
const PUSH_DELAY    = 2000;    // settle time after the last change
const MAX_PUSH_WAIT = 15000;   // force a flush at least this often during
                               // continuous activity (e.g. a running stopwatch)
let fbAuth = null, db = null, cloudUid = null, cloudUnsub = null;
let syncReady = false, pushTimer = null, lastPushedJson = null, firstDirtyAt = 0;
let syncStatus = '';   // human-readable status shown in the account sheet
let syncError  = '';   // last error code, if any
let lastUploadToast = 0;

function setSyncStatus(s, err) {
  syncStatus = s || '';
  syncError  = err || '';
  renderAcct();
}

const fbReady = !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId
                   && window.firebase);

function syncMeta() { try { return JSON.parse(localStorage.getItem(META_KEY)) || {}; } catch(e) { return {}; } }
function syncTouch() {
  try { localStorage.setItem(META_KEY, JSON.stringify({ updatedAt: Date.now() })); } catch(e) {}
  if (cloudUid && syncReady) schedulePush();
}
function schedulePush() {
  if (!firstDirtyAt) firstDirtyAt = Date.now();
  clearTimeout(pushTimer);
  // Debounce after the last change, but never wait longer than MAX_PUSH_WAIT
  // so continuous per-second changes still upload periodically.
  const delay = Math.min(PUSH_DELAY, Math.max(0, MAX_PUSH_WAIT - (Date.now() - firstDirtyAt)));
  pushTimer = setTimeout(pushCloud, delay);
}

function localBundle() {
  const j = (k, d) => { try { const v = localStorage.getItem(k); return v == null ? d : JSON.parse(v); } catch(e) { return d; } };
  return { timer: j(STORE_KEY, null), goals: j(GOALS_KEY, []), study: j(STUDY_KEY, null), notes: j(NOTES_KEY, []) };
}
// Union notes by id; for the same id keep the more recently edited one.
function mergeNotes(local, remote) {
  local = local || []; remote = remote || [];
  const map = new Map();
  remote.forEach(n => map.set(n.id, n));
  local.forEach(n => {
    const ex = map.get(n.id);
    if (!ex || (n.updatedAt || 0) >= (ex.updatedAt || 0)) map.set(n.id, n);
  });
  return [...map.values()].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}

// Merge study: recorded time never lost (max per day), settings follow
// newest-wins, and the live stopwatch run-state stays device-local so two
// devices can't double-count the same running stopwatch.
function mergeStudy(local, remote, remoteNewer) {
  if (!remote) return local;
  if (!local)  return remote;
  const out = remoteNewer ? Object.assign({}, local, remote)
                          : Object.assign({}, remote, local);
  out.swRunning  = local.swRunning;   // runtime state: this device only
  out.swLastTick = local.swLastTick;
  out.records = {};
  const keys = new Set([...Object.keys(local.records || {}), ...Object.keys(remote.records || {})]);
  keys.forEach(k => out.records[k] = Math.max(local.records?.[k] || 0, remote.records?.[k] || 0));
  return out;
}
// Union goals by id, preserving local order.
function mergeGoals(local, remote) {
  local = local || []; remote = remote || [];
  const ids = new Set(local.map(g => g.id));
  return local.concat(remote.filter(g => !ids.has(g.id)));
}

function pushCloud() {
  clearTimeout(pushTimer); pushTimer = null; firstDirtyAt = 0;
  if (!cloudUid || !syncReady || !db) return;
  const b = localBundle();
  const payload = { timer: b.timer ?? null, goals: b.goals || [], study: b.study ?? null,
                    notes: b.notes || [], updatedAt: syncMeta().updatedAt || Date.now() };
  const json = JSON.stringify(payload);
  if (json === lastPushedJson) return;
  lastPushedJson = json;
  db.collection('users').doc(cloudUid).set(payload)
    .then(() => {
      setSyncStatus('동기화됨', '');
      // Skip the toast for the periodic flushes while the stopwatch runs.
      if (!study.swRunning && Date.now() - lastUploadToast > 4000) {
        lastUploadToast = Date.now(); showToast('☁ 동기화 완료');
      }
    })
    .catch(e => {
      lastPushedJson = null;   // allow retry
      const code = e?.code || String(e);
      setSyncStatus('업로드 실패', code);
      showToast('동기화 업로드 실패: ' + code);
    });
}

// ── Canonical, jitter-free comparison helpers ──
// Stable key order + rounded seconds so semantically equal data never looks
// "changed" (which is what caused the reload ping-pong between devices).
function stableStr(v) {
  if (v === null || typeof v !== 'object') return JSON.stringify(v ?? null);
  if (Array.isArray(v)) return '[' + v.map(stableStr).join(',') + ']';
  return '{' + Object.keys(v).sort().map(k => JSON.stringify(k) + ':' + stableStr(v[k])).join(',') + '}';
}
function canonTimer(t) { return stableStr(t ?? null); }
function canonGoals(g) { return stableStr([...(g || [])].sort((a, b) => (a.id || 0) - (b.id || 0))); }
function canonStudy(s) {
  if (!s) return 'null';
  const rec = {};
  Object.keys(s.records || {}).forEach(k => { const v = Math.floor(s.records[k] || 0); if (v > 0) rec[k] = v; });
  return stableStr({ resetHour: s.resetHour || 0, records: rec });   // volatile run-state excluded
}
function canonNotes(n) {
  return stableStr([...(n || [])].sort((a, b) => (a.id || 0) - (b.id || 0))
    .map(x => ({ id: x.id, title: x.title || '', type: x.type || 'text',
                 text: x.text || '', items: x.items || [], pinned: !!x.pinned })));
}

function setMeta(v) { try { localStorage.setItem(META_KEY, JSON.stringify({ updatedAt: v })); } catch(e) {} }
function writeBundle(b) {
  try {
    if (b.timer) localStorage.setItem(STORE_KEY, JSON.stringify(b.timer));
    else         localStorage.removeItem(STORE_KEY);
    localStorage.setItem(GOALS_KEY, JSON.stringify(b.goals || []));
    if (b.study) localStorage.setItem(STUDY_KEY, JSON.stringify(b.study));
    localStorage.setItem(NOTES_KEY, JSON.stringify(b.notes || []));
  } catch(e) {}
}
// Refresh goals + study + notes in the live UI without a full page reload.
function applyGoalsStudyLive() {

// Reconcile a cloud snapshot with local data. Loop-free: the merged version
// is max(local, remote) — never "now" — so receiving an update doesn't make
// this device look newer and bounce back to the peer.
function onCloud(doc) {
  const remote = doc.exists ? doc.data() : null;
  setSyncStatus(remote ? '클라우드 연결됨' : '클라우드에 데이터 없음 — 이 기기 데이터를 업로드합니다', '');

  const local = localBundle();
  const lm = syncMeta().updatedAt || 0;
  const rm = remote?.updatedAt || 0;
  const remoteNewer = rm > lm;

  const merged = {
    timer: remoteNewer ? (remote?.timer ?? local.timer ?? null) : (local.timer ?? null),
    goals: mergeGoals(local.goals, remote?.goals),
    study: mergeStudy(local.study, remote?.study, remoteNewer),
    notes: mergeNotes(local.notes, remote?.notes),
  };
  const mergedVer = Math.max(lm, rm);

  // Canonical signatures for change detection.
  const sig = b => canonTimer(b.timer) + '|' + canonGoals(b.goals) + '|' + canonStudy(b.study) + '|' + canonNotes(b.notes);
  const localSig  = sig(local);
  const mergedSig = sig(merged);
  const remoteSig = remote ? sig({ timer: remote.timer, goals: remote.goals, study: remote.study, notes: remote.notes }) : '';

  const localChanged = mergedSig !== localSig;     // our stored data needs updating
  const cloudStale   = mergedSig !== remoteSig;    // cloud is missing some of our data

  syncReady = true;

  if (localChanged) {
    writeBundle(merged);
    setMeta(mergedVer);
    const timerChanged = canonTimer(local.timer) !== canonTimer(merged.timer);
    if (timerChanged) {
      // Active countdown changed — a reload is the safe way to restart it.
      if (cloudStale) { lastPushedJson = null; schedulePush(); }
      location.reload();
      return;
    }
    applyGoalsStudyLive();      // goals / study only → no reload needed
  } else {
    setMeta(mergedVer);         // adopt the higher version so we stop re-diffing
  }

  if (cloudStale) { lastPushedJson = null; schedulePush(); }
  renderAcct();
}

function onAuthChange(user) {
  if (cloudUnsub) { cloudUnsub(); cloudUnsub = null; }
  cloudUid = user ? user.uid : null;
  syncReady = false; lastPushedJson = null;
  syncStatus = ''; syncError = '';
  if (user && db) {
    setSyncStatus('연결 중…', '');
    cloudUnsub = db.collection('users').doc(user.uid)
      .onSnapshot(onCloud, e => {
        const code = e?.code || String(e);

  renderAcct();
}
